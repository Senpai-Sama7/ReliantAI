# Redis High Security Configuration
# ReliantAI Platform - Requires AUTH for all connections

# Network
bind 0.0.0.0
port 6379
protected-mode yes

# Authentication (REQUIRED)
# Password must be set via REDIS_PASSWORD env var
# Command: redis-server --requirepass $REDIS_PASSWORD

# ACL Configuration (Redis 6+)
# Users:
# - default: Full access with password
# - readonly: Read-only access for monitoring
# - app: Application-specific access

# Example ACL rules (apply via redis-cli after startup):
# ACL SETUSER default on >$REDIS_PASSWORD ~* +@all
# ACL SETUSER readonly on >readonlypass ~* +@read
# ACL SETUSER app on >apppass ~cache:* +@all -@dangerous

# Persistence
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice
logfile ""

# Client connections
timeout 300
tcp-keepalive 300
maxclients 10000

# Security
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG "CONFIG_a1b2c3d4"
rename-command SHUTDOWN "SHUTDOWN_e5f6g7h8"

# Backup
save 900 1
save 300 10
save 60 10000
