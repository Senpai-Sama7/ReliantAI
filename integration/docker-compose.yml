version: '3.9'

services:
  # ============================================================================
  # INFRASTRUCTURE
  # ============================================================================
  
  redis:
    image: redis:7-alpine
    container_name: reliantai-redis
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    # SECURITY FIX: Require Redis authentication in production
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: reliantai-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-reliantai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set}
    ports:
      - "5435:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reliantai}"]
      interval: 10s
      timeout: 3s
      retries: 3

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: reliantai-kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      - kafka-data:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ============================================================================
  # OBSERVABILITY
  # ============================================================================

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: reliantai-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 3s
      retries: 3

  grafana:
    image: grafana/grafana:10.2.2
    container_name: reliantai-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - ./observability/dashboards:/etc/grafana/provisioning/dashboards
      - ./observability/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ============================================================================
  # API GATEWAY
  # ============================================================================

  kong-database:
    image: postgres:16-alpine
    container_name: reliantai-kong-db
    environment:
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: ${KONG_PG_PASSWORD:?KONG_PG_PASSWORD must be set}
      POSTGRES_DB: kong
    volumes:
      - kong-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong"]
      interval: 10s
      timeout: 3s
      retries: 3

  kong-migrations:
    image: kong:3.5
    container_name: reliantai-kong-migrations
    command: kong migrations bootstrap
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_PORT: 5432
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: ${KONG_PG_PASSWORD:?KONG_PG_PASSWORD must be set}
      KONG_PG_DATABASE: kong
    depends_on:
      - kong-database
    restart: on-failure

  kong:
    # NOTE: For High Availability, use docker-compose.ha.yml instead
    # which provides nginx load balancer + 2+ Kong instances
    image: kong:3.5
    container_name: reliantai-kong
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_PORT: 5432
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: ${KONG_PG_PASSWORD:?KONG_PG_PASSWORD must be set}
      KONG_PG_DATABASE: kong
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_LISTEN: 0.0.0.0:8000, 0.0.0.0:8443 ssl
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
    volumes:
      - ./gateway:/kong/declarative
    depends_on:
      - kong-database
      - kong-migrations
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ============================================================================
  # INTEGRATION SERVICES
  # ============================================================================

  auth-service:
    build:
      context: .
      dockerfile: auth/Dockerfile
    container_name: reliantai-auth
    ports:
      - "8080:8080"
    environment:
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY}
      JWT_SECRET: ${AUTH_SECRET_KEY}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUTH_PORT: 8080
    depends_on:
      - redis
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import httpx; exit(0 if httpx.get(\"http://localhost:8080/health\").status_code == 200 else 1)'"]
      interval: 10s
      timeout: 5s
      retries: 3

  event-bus:
    build:
      context: .
      dockerfile: event-bus/Dockerfile
    container_name: reliantai-event-bus
    ports:
      - "8081:8081"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EVENT_BUS_API_KEY: ${EVENT_BUS_API_KEY:-test-api-key-123}
      EVENT_BUS_HOST: 0.0.0.0
      EVENT_BUS_PORT: 8081
    depends_on:
      - redis
      - kafka
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import httpx; exit(0 if httpx.get(\"http://localhost:8081/health\").status_code == 200 else 1)'"]
      interval: 10s
      timeout: 5s
      retries: 3

  saga-orchestrator:
    build:
      context: ./saga
      dockerfile: Dockerfile
    container_name: reliantai-saga
    ports:
      - "8090:8090"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SAGA_PORT: 8090
    depends_on:
      - redis
      - kafka
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; r = urllib.request.urlopen(\"http://localhost:8090/health\"); exit(0 if r.status == 200 else 1)' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis-data:
  postgres-data:
  kong-db-data:
  kafka-data:
  prometheus-data:
  grafana-data:

networks:
  default:
    name: reliantai-network
