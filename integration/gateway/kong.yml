_format_version: "3.0"

# Services - All 15 ReliantAI projects
services:
  - name: event-bus
    url: http://event-bus:8081
    routes:
      - name: event-bus-publish
        paths:
          - /publish
        strip_path: false
      - name: event-bus-event
        paths:
          - /event
        strip_path: false
      - name: event-bus-dlq
        paths:
          - /dlq
        strip_path: false
      - name: event-bus-health
        paths:
          - /event-bus/health
        strip_path: false
        plugins:
          - name: request-transformer
            config:
              replace:
                uri: /health
    plugins:
      - name: jwt
        config:
          secret_is_base64: false
          # Allow health checks without auth
          anonymous: anonymous-consumer
      - name: rate-limiting
        config:
          minute: 2000
          policy: redis
          redis_host: redis
          redis_port: 6379
      - name: correlation-id
        config:
          header_name: X-Correlation-ID
          generator: uuid
      - name: prometheus
      - name: file-log
        config:
          path: /tmp/kong-event-bus.log

  - name: auth-service
    url: http://auth-service:8080
    routes:
      - name: auth-route
        paths:
          - /auth
        strip_path: true
      - name: auth-health
        paths:
          - /health
        strip_path: false
        methods:
          - GET
        plugins:
          - name: jwt
            config:
              anonymous: anonymous-consumer
    plugins:
      - name: jwt
        config:
          secret_is_base64: false
          uri_param_names: []
          claims_to_verify:
            - exp
      - name: rate-limiting
        config:
          minute: 100
          policy: redis
          redis_host: redis
          redis_port: 6379
      - name: correlation-id
        config:
          header_name: X-Correlation-ID
          generator: uuid
      - name: prometheus
      - name: file-log
        config:
          path: /tmp/kong-auth.log

  - name: apex-core
