# Global plugins
plugins:
  - name: prometheus
    config:
      per_consumer: true
  - name: correlation-id
    config:
      header_name: X-Correlation-ID
      generator: uuid
      echo_downstream: true

# Consumers
consumers:
  - username: anonymous-consumer
    custom_id: anonymous-health-check
  - username: auth-service-consumer
    custom_id: auth-service
    jwt_secrets:
      - algorithm: HS256
        key: auth-service-key
        secret: H7RCmupa2HVr0c_wbTgEE3YJPAYyEYYYDVefV-7S2Qhq6F5y88tlp8I3zss9Yr7tHuEoDMmqRsD6huMBJmLgpA

# JWT configuration (shared secret with Auth Service)
# Note: In production, configure via environment variable
# KONG_JWT_SECRET=your-secret-key-min-32-chars-change-in-production
