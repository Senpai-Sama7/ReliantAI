_format_version: "3.0"

# Services - All 13 ReliantAI projects
services:
  - name: auth-service
    url: http://auth-service:8080
    routes:
      - name: auth-route
        paths:
          - /auth
        strip_path: true
    plugins:
      - name: prometheus
      - name: file-log
        config:
          path: /tmp/kong-auth.log

  - name: apex-core
    url: http://apex-core:8000
    routes:
      - name: apex-core-route
        paths:
          - /apex
        strip_path: true
    plugins:
      - name: jwt
        config:
          secret_is_base64: false
      - name: rate-limiting
        config:
          minute: 1000
          policy: local
      - name: correlation-id
        config:
          header_name: X-Correlation-ID
          generator: uuid
      - name: request-transformer
        config:
          add:
            headers:
              - X-User-ID:$(jwt_claims.sub)
              - X-Tenant-ID:$(jwt_claims.tenant_id)
      - name: prometheus
      - name: file-log
        config:
          path: /tmp/kong-apex.log

  - name: citadel
