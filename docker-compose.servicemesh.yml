# ReliantAI Platform — Service Mesh (Linkerd) Configuration
#
# This overlay adds Linkerd proxy sidecars to all services for:
#   - mTLS between all service-to-service communication
#   - Automatic retries and timeouts
#   - Traffic splitting (canary/blue-green at mesh level)
#   - Latency and success-rate metrics per route
#
# Usage:
#   1. Install Linkerd CLI: curl -sL https://run.linkerd.io/install | sh
#   2. Install control plane: linkerd install | kubectl apply -f -
#   3. Deploy platform with mesh: docker compose -f docker-compose.yml -f docker-compose.servicemesh.yml up -d
#
# Note: This Docker Compose variant is for local development / CI testing.
# Production uses Kubernetes + Linkerd2.

version: '3.8'

services:
  # ── Linkerd Control Plane (local compose variant) ─────────────────────────
  # In production, this is replaced by Kubernetes Linkerd namespace.
  # For local Docker Compose, we use linkerd-proxy as a transparent proxy.

  linkerd-proxy:
    image: ghcr.io/linkerd/proxy:stable-2.14.10
    container_name: reliantai-linkerd-proxy
    environment:
      LINKERD2_PROXY_LOG: warn,linkerd=info
      LINKERD2_PROXY_CONTROL_LISTEN_ADDR: 0.0.0.0:4190
      LINKERD2_PROXY_ADMIN_LISTEN_ADDR: 0.0.0.0:4191
      LINKERD2_PROXY_OUTBOUND_LISTEN_ADDR: 0.0.0.0:4140
      LINKERD2_PROXY_INBOUND_LISTEN_ADDR: 0.0.0.0:4143
      LINKERD2_PROXY_IDENTITY_DISABLED: "true"
      LINKERD2_PROXY_DESTINATION_PROFILE_SUFFIXES: ".reliantai-network"
    networks:
      - reliantai-network
    ports:
      - "4190:4190"  # Control
      - "4191:4191"  # Admin
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4191/ready"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Linkerd Viz (Dashboard) ──────────────────────────────────────────────
  linkerd-viz:
    image: ghcr.io/linkerd/viz:stable-2.14.10
    container_name: reliantai-linkerd-viz
    ports:
      - "8084:8084"
    environment:
      LINKERD_NAMESPACE: reliantai
    networks:
      - reliantai-network
    depends_on:
      - linkerd-proxy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ── Service mesh annotations (via proxy injection) ─────────────────────
  # In Kubernetes, this is done via namespace annotation:
  #   kubectl annotate namespace default linkerd.io/inject=enabled
  #
  # In Docker Compose, we manually set proxy environment variables on each
  # service to route outbound traffic through Linkerd.

  # Example: Money service with Linkerd proxy
  money-mesh:
    extends:
      service: money
    environment:
      # HTTP_PROXY causes applications to route outbound through Linkerd
      HTTP_PROXY: http://linkerd-proxy:4140
      HTTPS_PROXY: http://linkerd-proxy:4140
      NO_PROXY: localhost,127.0.0.1,postgres,redis
    networks:
      - reliantai-network
    depends_on:
      - linkerd-proxy
