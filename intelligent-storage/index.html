    <style>
      * {
        font-family: "Inter", sans-serif;
      }
      .font-mono {
        font-family: "JetBrains Mono", monospace;
      }
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #1e293b;
      }
      ::-webkit-scrollbar-thumb {
        background: #475569;
        border-radius: 3px;
      }
      .glass {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .glass-dark {
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(10px);
      }
      .loading {
        animation: pulse 1.5s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
      .fade-in {
        animation: fadeIn 0.3s ease-in;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .modal-backdrop {
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(4px);
      }

      /* Custom search styles */
      .search-suggestion {
        transition: all 0.2s;
      }
      .search-suggestion:hover {
        background: rgba(59, 130, 246, 0.2);
        transform: translateX(4px);
      }

      /* Tab animations */
      .tab-content {
        animation: slideIn 0.3s ease-out;
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(-10px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      /* Notification badge */
      .notification-badge {
        animation: bounce 0.5s ease-in-out;
      }
      @keyframes bounce {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.2);
        }
      }

      /* Syntax Highlighting */
      .code-preview {
        max-height: 400px;
        overflow-y: auto;
      }
      .code-preview pre {
        margin: 0;
        padding: 1rem;
        background: #282c34;
        border-radius: 0.5rem;
      }
      .code-preview code {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.875rem;
        line-height: 1.5;
      }
      .hljs {
        background: transparent !important;
      }

      /* Line numbers for code */
      .code-with-lines {
        counter-reset: line;
      }
      .code-with-lines .line {
        display: block;
      }
      .code-with-lines .line::before {
        counter-increment: line;
        content: counter(line);
        display: inline-block;
        width: 2rem;
        margin-right: 1rem;
        text-align: right;
        color: #495162;
        user-select: none;
      }

      /* Filter sidebar styles */
      .filter-sidebar-scroll::-webkit-scrollbar {
        width: 4px;
      }
      .filter-sidebar-scroll::-webkit-scrollbar-track {
        background: transparent;
      }
      .filter-sidebar-scroll::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 2px;
      }
      .filter-sidebar-scroll::-webkit-scrollbar-thumb:hover {
        background: #475569;
      }

      /* Date input styling */
      input[type="date"]::-webkit-calendar-picker-indicator {
        filter: invert(0.6);
        cursor: pointer;
      }
      input[type="date"]::-webkit-calendar-picker-indicator:hover {
        filter: invert(0.8);
      }

      /* Checkbox styling */
      input[type="checkbox"] {
        appearance: none;
        width: 1rem;
        height: 1rem;
        border: 1px solid #475569;
        border-radius: 0.25rem;
        background-color: #1e293b;
        cursor: pointer;
        position: relative;
      }
      input[type="checkbox"]:checked {
        background-color: #3b82f6;
        border-color: #3b82f6;
      }
      input[type="checkbox"]:checked::after {
        content: "";
        position: absolute;
        left: 4px;
        top: 1px;
        width: 5px;
        height: 9px;
        border: solid white;
        border-width: 0 2px 2px 0;
        transform: rotate(45deg);
      }

      /* Range slider styling */
      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        background: transparent;
        cursor: pointer;
      }
      input[type="range"]::-webkit-slider-track {
        background: #334155;
        height: 6px;
        border-radius: 3px;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        background: #3b82f6;
        height: 16px;
        width: 16px;
        border-radius: 50%;
        margin-top: -5px;
        border: 2px solid #1e293b;
      }
      input[type="range"]::-webkit-slider-thumb:hover {
        background: #60a5fa;
        transform: scale(1.1);
      }

      /* Accessibility enhancements */
      .skip-link {
        position: absolute;
        left: 1rem;
        top: -100px;
        z-index: 100;
        padding: 0.75rem 1rem;
        border-radius: 0.5rem;
        background: #1d4ed8;
        color: #fff;
        font-weight: 600;
        transition: top 0.2s ease;
      }
      .skip-link:focus {
        top: 1rem;
      }
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      :focus-visible {
        outline: 2px solid #60a5fa;
        outline-offset: 2px;
      }

      body[data-reduce-motion="true"] *,
      body[data-reduce-motion="true"] *::before,
      body[data-reduce-motion="true"] *::after {
        animation: none !important;
        transition: none !important;
        scroll-behavior: auto !important;
      }

      body[data-large-text="true"] {
        font-size: 17px;
      }

      body[data-high-contrast="true"] {
        color: #ffffff;
        background: #020617 !important;
      }
      body[data-high-contrast="true"] .glass {
        background: rgba(2, 6, 23, 0.92);
        border-color: rgba(255, 255, 255, 0.28);
      }
      body[data-high-contrast="true"] .glass-dark {
        background: rgba(2, 6, 23, 0.96);
      }

      .file-context-menu {
        min-width: 14rem;
        max-width: 18rem;
      }
    </style>

      function formatBytes(bytes) {
        if (!bytes || bytes === 0) return "0 B";
        const k = 1024;
        const sizes = ["B", "KB", "MB", "GB", "TB"];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + " " + sizes[i];
      }

      function getLanguageFromExtension(ext) {
        if (!ext) return "plaintext";
        const langMap = {
          ".py": "python",
          ".pyw": "python",
          ".pyi": "python",
          ".js": "javascript",
          ".jsx": "javascript",
          ".ts": "typescript",
          ".tsx": "typescript",
          ".rs": "rust",
          ".go": "go",

          ".markdown": "markdown",

        return langMap[ext.toLowerCase()] || "plaintext";
      }

      function escapeHtml(text) {
        if (!text) return "";
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      function escapeForSingleQuotedJS(text) {
        if (text === null || text === undefined) return "";
        return String(text)
          .replace(/\\/g, "\\\\")
          .replace(/'/g, "\\'")
          .replace(/\r?\n/g, " ");
      }

      function extractExtensionFromPath(pathOrName) {
        if (!pathOrName) return "";
        const value = String(pathOrName);
        const match = value.match(/(\.[a-zA-Z0-9]+)$/);
        return match ? match[1].toLowerCase() : "";
      }

      function normalizeInsightsPayload(rawPayload) {
        const payload =
          rawPayload && typeof rawPayload === "object" ? rawPayload : {};

        const byExtension = payload.clusters?.by_extension || [];
        const semantic_clusters = byExtension.map((entry) => {
          const fileCount = Number(entry.count || 0);
          const avgSize = Number(entry.avg_size || 0);
          return {
            cluster_type: entry.extension || "No Extension",
            file_count: fileCount,
            total_size: Math.round(fileCount * avgSize),
          };
        });

        const anomalyList = payload.anomalies?.large_files || [];
        const anomalies = anomalyList.map((item) => ({
          id: item.id,
          name: item.name || "Unknown",
          size_bytes: item.size_bytes || 0,
          path: item.path || "",
        }));

        const duplicateGroups = {};
        (payload.duplicates || []).forEach((dup) => {
          const groupKey = dup.sha256 || `${dup.name || "unknown"}:${dup.size_bytes || 0}`;
          if (!duplicateGroups[groupKey]) {
            duplicateGroups[groupKey] = {
              sha256: dup.sha256 || "",
              count: Number(dup.dup_count || 1),
              paths: [],
            };
          }
          if (dup.path) {
            duplicateGroups[groupKey].paths.push(dup.path);
          }
          if (!duplicateGroups[groupKey].count && dup.dup_count) {
            duplicateGroups[groupKey].count = Number(dup.dup_count);
          }
        });

        const duplicates = Object.values(duplicateGroups)
          .map((group) => ({
            ...group,
            count: group.count || group.paths.length || 1,
          }))
          .sort((a, b) => (b.count || 0) - (a.count || 0));

        return {
          insights: {
            semantic_clusters,
            anomalies,
            duplicates,
          },
          raw: payload,
        };
      }

      function normalizeRecommendationsPayload(rawPayload, context) {
        const list = Array.isArray(rawPayload)
          ? rawPayload
          : rawPayload?.recommendations || [];

        return {
          recommendations: list.map((item) => ({
            id: item.file_id || item.id,
            file_id: item.file_id || item.id,
            path: item.path || "",
            name: item.name || "Unknown",
            extension: item.extension || extractExtensionFromPath(item.name || item.path),
            relevance:
              item.relevance !== undefined
                ? Number(item.relevance)
                : Number(item.confidence || 0),
            reason: item.reason || "Relevant to your context",
            explanation:
              item.explanation ||
              `Recommended for "${context}" based on semantic similarity.`,
            content_preview: item.content_preview || "",
          })),
        };
      }

      function normalizeGraphPayload(rawPayload) {
        const payload =
          rawPayload && typeof rawPayload === "object" ? rawPayload : {};

        if (payload.graph_data?.nodes && payload.graph_data?.edges) {
          return payload;
        }

        const center = payload.center || null;
        const neighbors = Array.isArray(payload.neighbors) ? payload.neighbors : [];
        const centerId = center?.id || null;

        const nodes = [];
        const edges = [];

        if (centerId !== null) {
          nodes.push({
            id: center.id,
            name: center.name,
            path: center.path,
            extension: center.extension,
            is_center: true,
          });
        }

        neighbors.forEach((neighbor) => {
          nodes.push({
            id: neighbor.id,
            name: neighbor.name,
            path: neighbor.path,
            extension: neighbor.extension || extractExtensionFromPath(neighbor.name || neighbor.path),
            is_center: false,
          });
          if (centerId !== null) {
            edges.push({
              source: centerId,
              target: neighbor.id,
              relationship: neighbor.relationship || "similarity",
              weight: Number(neighbor.weight || 0),
            });
          }
        });

        return {
          ...payload,
          center_file: center,
          metrics: {
            total_nodes: nodes.length,
            total_edges: edges.length,
            clustering_coefficient: 0,
          },
          graph_data: {
            nodes,
            edges,
          },
        };
      }

      function normalizeTreePayload(rawPayload, seedQuery) {
        const payload =
          rawPayload && typeof rawPayload === "object" ? rawPayload : {};

        if (payload.tree && payload.analysis) {
          return payload;
        }

        const paths = Array.isArray(payload.reasoning_paths)
          ? payload.reasoning_paths
          : [];

        const rootFiles = paths.map((path, index) => ({
          id: path.id || index + 1,
          name: path.current_focus || `Result ${index + 1}`,
          path: path.path || "",
          relevance: Number(path.confidence || 0),
          content_preview: path.reasoning || "",
        }));

        const root = {
          query: payload.seed_query || seedQuery,
          depth: 0,
          files: rootFiles,
          children: paths.map((path, index) => ({
            query: path.current_focus || `Branch ${index + 1}`,
            parent_query: payload.seed_query || seedQuery,
            depth: 1,
            files: [
              {
                id: path.id || index + 1,
                name: path.current_focus || `Result ${index + 1}`,
                path: path.path || "",
                relevance: Number(path.confidence || 0),
                content_preview: path.reasoning || "",
              },
            ],
            children: [],
          })),
        };

        return {
          tree: root,
          analysis: {
            total_nodes: 1 + paths.length,
            max_depth_reached: Number(payload.depth_reached || 1),
            exploration_strategy: payload.strategy || "diversity",
            key_findings: paths
              .slice(0, 3)
              .map((path) => `${path.current_focus}: ${(path.confidence || 0).toFixed(2)} confidence`),
          },
          raw: payload,
        };
      }

      function formatDate(dateStr) {
        if (!dateStr) return "Unknown";
        const date = new Date(dateStr);
        const now = new Date();
        const diffMs = now - date;
        const diffMins = Math.floor(diffMs / 60000);
        const diffHours = Math.floor(diffMs / 3600000);
        const diffDays = Math.floor(diffMs / 86400000);

        if (diffMins < 1) return "Just now";
        if (diffMins < 60) return diffMins + " min ago";
        if (diffHours < 24) return diffHours + " hours ago";
        if (diffDays < 7) return diffDays + " days ago";
        return date.toLocaleDateString();
      }

      function announceForA11y(message) {
        const region = document.getElementById("aria-status");
        if (!region) return;
        region.textContent = "";
        requestAnimationFrame(() => {
          region.textContent = message;
        });
      }

      function closeContextMenu() {
        if (!state.contextMenu.visible) return;
        state.contextMenu = { visible: false, x: 0, y: 0, file: null };
        render();
      }

      function showFileContextMenu(event, file) {
        if (!state.settings.enableRightClickMenu) {
          return;
        }
        event.preventDefault();
        event.stopPropagation();

        const menuWidth = 260;
        const menuHeight = 260;
        const x = Math.max(
          8,
          Math.min(event.clientX, window.innerWidth - menuWidth - 8),
        );
        const y = Math.max(
          8,
          Math.min(event.clientY, window.innerHeight - menuHeight - 8),
        );

        state.contextMenu = { visible: true, x, y, file };
        render();
      }

      function handleResultCardKeydown(event, file) {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          openFileById(file.id || null, file);
          return;
        }
        if (event.key === "ContextMenu" || (event.shiftKey && event.key === "F10")) {
          event.preventDefault();
          const rect = event.currentTarget.getBoundingClientRect();
          showFileContextMenu(
            {
              preventDefault: () => {},
              stopPropagation: () => {},
              clientX: rect.left + Math.min(220, rect.width - 10),
              clientY: rect.top + Math.min(40, rect.height - 10),
            },
            file,
          );
        }
      }

      async function copyToClipboard(text, label = "Value") {
        if (!text) {
          addNotification(`No ${label.toLowerCase()} available`, "error");
          return;
        }
        try {
          await navigator.clipboard.writeText(text);
          addNotification(`${label} copied`, "success");
          announceForA11y(`${label} copied to clipboard`);
        } catch (error) {
          console.error("Clipboard error:", error);
          addNotification("Clipboard write failed", "error");
        }
      }

      async function openFileById(fileId, fallbackFile = null) {
        if (!fileId) {
          if (fallbackFile) {
            setSelectedFile(fallbackFile);
          }
          return;
        }

        try {
          const detailResponse = await fetch(`/api/files/${fileId}`);
          if (!detailResponse.ok) {
            throw new Error("Failed to fetch file details");
          }
          const detail = await detailResponse.json();

          try {
            const contentResponse = await fetch(`/api/files/${fileId}/content`);
            if (contentResponse.ok) {
              const contentData = await contentResponse.json();
              detail.content_preview = contentData.content || detail.content_preview;
            }
          } catch (_error) {
            // Keep detail payload if content endpoint is unavailable.
          }

          setSelectedFile(detail);
        } catch (error) {
          console.error("Error opening file details:", error);
          if (fallbackFile) {
            setSelectedFile(fallbackFile);
          } else {
            addNotification("Unable to open file details", "error");
          }
        }
      }

      async function handleContextMenuAction(action) {
        const file = state.contextMenu.file;
        closeContextMenu();
        if (!file) return;

        switch (action) {
          case "open":
            await openFileById(file.id, file);
            break;
          case "copyPath":
            await copyToClipboard(file.path, "Path");
            break;
          case "copyName":
            await copyToClipboard(file.name, "File name");
            break;
          case "searchName":
            runSmartSearch(file.name || "");
            break;
          case "filterExtension":
            if (file.extension) {
              state.filters.extensions = [file.extension];
              updateActiveFiltersCount();
              runSmartSearch(state.searchQuery || file.extension);
            } else {
              addNotification("No extension available for this file", "info");
            }
            break;
          case "exportOne":
            exportSingleResult(file);
            break;
          default:
            break;
        }
      }

      function exportSingleResult(file) {
        const safeName = (file.name || "file").replace(/[^a-z0-9]/gi, "_").toLowerCase();
        const payload = JSON.stringify(file, null, 2);
        const blob = new Blob([payload], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `${safeName}-metadata.json`;
        a.click();
        URL.revokeObjectURL(url);
        addNotification("Exported file metadata", "success");
      }

      function updateSetting(key, value) {
        state.settings[key] = value;
        if (key === "enableRightClickMenu" && !value) {
          closeContextMenu();
        }
        saveSettings();
        applySettingsToDocument();
        render();

        if (
          state.searchQuery &&
          !state.searchLoading &&
          (key === "resultLimit" || key === "includeSimilarFiles")
        ) {
          runSmartSearch(state.searchQuery);
        }
      }

      function updateSearchWeights(key, value) {
        const parsedValue = Math.max(0, Math.min(100, Number(value) || 0));
        const weightKeys = ["semanticWeight", "keywordWeight", "metaWeight"];
        const otherKeys = weightKeys.filter((k) => k !== key);
        const remaining = 100 - parsedValue;
        const otherTotal = otherKeys.reduce(
          (sum, k) => sum + (Number(state.settings[k]) || 0),
          0,
        );

        state.settings[key] = parsedValue;
        if (otherTotal <= 0) {
          state.settings[otherKeys[0]] = Math.floor(remaining / 2);
          state.settings[otherKeys[1]] = remaining - state.settings[otherKeys[0]];
        } else {
          const firstShare = Math.round(
            ((Number(state.settings[otherKeys[0]]) || 0) / otherTotal) * remaining,
          );
          state.settings[otherKeys[0]] = Math.max(0, firstShare);
          state.settings[otherKeys[1]] = Math.max(
            0,
            remaining - state.settings[otherKeys[0]],
          );
        }

        saveSettings();
        render();
      }

      function applySearchPreset(semanticWeight, keywordWeight, metaWeight) {
        const total = semanticWeight + keywordWeight + metaWeight;
        if (!total) return;

        state.settings.semanticWeight = Math.round((semanticWeight / total) * 100);
        state.settings.keywordWeight = Math.round((keywordWeight / total) * 100);
        state.settings.metaWeight =
          100 - state.settings.semanticWeight - state.settings.keywordWeight;

        saveSettings();
        render();
        addNotification("Search weight preset applied", "info");
      }

      function resetSettings() {
        state.settings = { ...DEFAULT_SETTINGS };
        saveSettings();
        applySettingsToDocument();
        render();
        addNotification("Settings reset to defaults", "info");
      }

      async function performSearch(query) {
        if (!query.trim()) return;

        state.searchLoading = true;
        state.searchQuery = query;
        state.view = "search";
        render();

        try {
          const response = await fetch("/api/search/advanced", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              query: query,
              semantic_weight: (state.settings.semanticWeight || 60) / 100,
              keyword_weight: (state.settings.keywordWeight || 30) / 100,
              meta_weight: (state.settings.metaWeight || 10) / 100,
              limit: state.settings.resultLimit || 20,
              include_similar: !!state.settings.includeSimilarFiles,
              include_relationships: true,
            }),
          });

          if (!response.ok) {
            throw new Error(`Advanced search failed (${response.status})`);
          }

          const data = await response.json();
          state.searchResults = data;

          if (!state.recentSearches.includes(query)) {
            state.recentSearches.unshift(query);
            if (state.recentSearches.length > 10) state.recentSearches.pop();
            localStorage.setItem(
              "recentSearches",
              JSON.stringify(state.recentSearches),
            );
          }

          addNotification(
            `Found ${data.total || 0} results for "${query}"`,
            "success",
          );
        } catch (error) {
          console.error("Search error:", error);
          state.searchResults = { results: [], total: 0 };
          addNotification("Search failed. Please try again.", "error");
        } finally {
          state.searchLoading = false;
          render();
        }
      }

      }

      async function fetchRecommendations(context) {

      function updateActiveFiltersCount() {
        let count = 0;
        if (state.filters.extensions.length > 0) count++;
        if (state.filters.partitions.length > 0) count++;
        if (state.filters.mimeTypes.length > 0) count++;
        if (state.filters.dateRange.start || state.filters.dateRange.end)
          count++;
        if (
          state.filters.sizeRange.min > 0 ||
          state.filters.sizeRange.max < 10737418240
        )
          count++;
        state.activeFiltersCount = count;
      }

      function clearAllFilters() {
        state.filters.extensions = [];
        state.filters.partitions = [];
        state.filters.mimeTypes = [];
        state.filters.dateRange = { start: "", end: "" };
        state.filters.sizeRange = { min: 0, max: 10737418240 };
        state.filters.sortBy = "relevance";
        state.filters.sortOrder = "desc";
        state.activeFiltersCount = 0;
        if (state.searchQuery) {
          runSmartSearch(state.searchQuery);
        }
        render();
      }

      function applyFilters() {
        if (state.searchQuery) {
          runSmartSearch(state.searchQuery);
        }
      }

      function runSmartSearch(query) {
        const normalizedQuery = String(query || "").trim();
        if (!normalizedQuery) return;
        if (state.activeFiltersCount > 0) {
          return performFacetedSearch(normalizedQuery);
        }
        return performSearch(normalizedQuery);
      }

      async function performFacetedSearch(query) {
        if (!query.trim()) return;

        state.searchLoading = true;
        state.searchQuery = query;
        state.view = "search";
        render();

        try {
          const facets = {};
          if (state.filters.extensions.length > 0)
            facets.extensions = state.filters.extensions;
          if (state.filters.partitions.length > 0)
            facets.partitions = state.filters.partitions;
          if (state.filters.mimeTypes.length > 0)
            facets.mime_types = state.filters.mimeTypes;

          const requestBody = {
            query: query,
            facets: facets,
            limit: state.settings.resultLimit || 20,
            page: 1,
          };

          if (state.filters.dateRange.start && state.filters.dateRange.end) {
            requestBody.date_range = [
              state.filters.dateRange.start,
              state.filters.dateRange.end,
            ];
          }

          if (
            state.filters.sizeRange.min > 0 ||
            state.filters.sizeRange.max < 10737418240
          ) {
            requestBody.size_range = [
              state.filters.sizeRange.min,
              state.filters.sizeRange.max,
            ];
          }

          const response = await fetch("/api/search/faceted", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(requestBody),
          });

          if (!response.ok) {
            throw new Error(`Faceted search failed (${response.status})`);
          }

          const data = await response.json();

          // Transform faceted search results to match existing format
          state.searchResults = {
            results: data.files.map((f) => ({
              id: f.id,
              name: f.name,
              path: f.path,
              extension: f.extension,
              size_bytes: f.size_bytes,
              mime_type: f.mime_type,
              file_modified_at: f.file_modified_at,
              content_preview: f.content_preview,
              tags: f.tags || [],
              score: 1.0, // Faceted search doesn't have scores
            })),
            total: data.total,
            total_pages: Math.ceil(data.total / data.limit),
            page: data.page,
            aggregations: data.aggregations,
          };

          state.availableFilters = data.aggregations;

          if (!state.recentSearches.includes(query)) {
            state.recentSearches.unshift(query);
            if (state.recentSearches.length > 10) state.recentSearches.pop();
            localStorage.setItem(
              "recentSearches",
              JSON.stringify(state.recentSearches),
            );
          }

          addNotification(
            `Found ${data.total || 0} results for "${query}"`,
            "success",
          );
        } catch (error) {
          console.error("Faceted search error:", error);
          state.searchResults = { results: [], total: 0 };
          addNotification("Search failed. Please try again.", "error");
        } finally {
          state.searchLoading = false;
          render();
        }
      }

      function saveFilterPreset(name) {
        if (!name.trim()) return;

        const preset = {
          id: Date.now(),
          name: name,
          filters: JSON.parse(JSON.stringify(state.filters)),
        };

        state.filterPresets.push(preset);
        localStorage.setItem(
          "filterPresets",
          JSON.stringify(state.filterPresets),
        );
        addNotification(`Filter preset "${name}" saved`, "success");
        render();
      }

      function loadFilterPreset(presetId) {
        const preset = state.filterPresets.find((p) => p.id === presetId);
        if (preset) {
          state.filters = JSON.parse(JSON.stringify(preset.filters));
          updateActiveFiltersCount();
          if (state.searchQuery) {
            runSmartSearch(state.searchQuery);
          } else {
            render();
          }
          addNotification(`Filter preset "${preset.name}" loaded`, "info");
        }
      }

      function deleteFilterPreset(presetId) {
        state.filterPresets = state.filterPresets.filter(

        localStorage.setItem(

      function getSizePresetLabel(bytes) {
        if (bytes === 0) return "0 B";
        const k = 1024;
        const sizes = ["B", "KB", "MB", "GB", "TB"];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + " " + sizes[i];
      }

      async function fetchGraphData(fileId) {
        try {
          const response = await fetch("/api/graph/query", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              center_file_id: fileId,
              depth: 2,
              min_similarity: 0.6,
              relationship_types: ["similarity", "directory", "semantic"],
            }),
          });
          if (!response.ok) {
            throw new Error(`Graph query failed (${response.status})`);
          }
          const rawGraph = await response.json();
          state.graphData = normalizeGraphPayload(rawGraph);
          render();
          drawGraph();
        } catch (error) {
          console.error("Error fetching graph:", error);
          addNotification("Failed to load graph data", "error");
        }
      }

      // D3.js Graph Variables
      let graphSimulation = null;
      let graphZoom = null;

      function resetGraphZoom() {
        if (!graphZoom) {
          addNotification("Graph is not rendered yet", "info");
          return;
        }

        const svg = d3.select("#graphContainer svg");
        if (svg.empty()) {
          addNotification("Graph is not rendered yet", "info");
          return;
        }

        svg
          .transition()
          .duration(750)
          .call(graphZoom.transform, d3.zoomIdentity);
      }

      function drawGraph() {
        if (!state.graphData?.graph_data) return;

        const container = document.getElementById("graphContainer");
        if (!container) return;

        // Clear previous graph
        container.innerHTML = "";

        const width = container.clientWidth;
        const height = 400;

        const nodes = state.graphData.graph_data.nodes.map((n) => ({ ...n }));
        const edges = state.graphData.graph_data.edges.map((e) => ({ ...e }));

        // Create SVG
        const svg = d3
          .select("#graphContainer")
          .append("svg")
          .attr("width", width)
          .attr("height", height)
          .attr("viewBox", [0, 0, width, height])
          .style("max-width", "100%")
          .style("height", "auto");

        // Add zoom behavior
        graphZoom = d3
          .zoom()
          .scaleExtent([0.1, 4])
          .on("zoom", (event) => {
            g.attr("transform", event.transform);
          });

        svg.call(graphZoom);

        // Create a group for the graph content
        const g = svg.append("g");

        // Create force simulation
        graphSimulation = d3
          .forceSimulation(nodes)
          .force(
            "link",
            d3
              .forceLink(edges)
              .id((d) => d.id)
              .distance(100),
          )
          .force("charge", d3.forceManyBody().strength(-400))
          .force("center", d3.forceCenter(width / 2, height / 2))
          .force(
            "collision",
            d3.forceCollide().radius((d) => (d.is_center ? 35 : 25)),
          );

        // Create links
        const link = g
          .append("g")
          .attr("class", "links")
          .selectAll("line")
          .data(edges)
          .enter()
          .append("line")
          .attr("stroke", (d) => {
            if (d.relationship === "similarity")
              return "rgba(59, 130, 246, 0.6)";
            if (d.relationship === "directory")
              return "rgba(139, 92, 246, 0.6)";
            return "rgba(100, 116, 139, 0.6)";
          })
          .attr("stroke-width", (d) =>
            d.weight ? Math.max(1, d.weight * 4) : 2,
          )
          .attr("stroke-opacity", 0.8);

        // Create nodes group
        const node = g
          .append("g")
          .attr("class", "nodes")
          .selectAll("g")
          .data(nodes)
          .enter()
          .append("g")
          .attr("class", "node")
          .style("cursor", "pointer")
          .call(
            d3
              .drag()
              .on("start", dragstarted)
              .on("drag", dragged)
              .on("end", dragended),
          );

        // Add node circles
        node
          .append("circle")
          .attr("r", (d) => (d.is_center ? 25 : 15))
          .attr("fill", (d) => (d.is_center ? "#8b5cf6" : "#3b82f6"))
          .attr("stroke", "#1e293b")
          .attr("stroke-width", 3)
          .attr("class", "node-circle")
          .transition()
          .duration(500)
          .attrTween("r", (d) => {
            const i = d3.interpolate(0, d.is_center ? 25 : 15);
            return (t) => i(t);
          });

        // Add node labels
        node
          .append("text")
          .attr("dy", (d) => (d.is_center ? 40 : 30))
          .attr("text-anchor", "middle")
          .attr("fill", "#94a3b8")
          .attr("font-size", "12px")
          .attr("font-family", "Inter, sans-serif")
          .style("pointer-events", "none")
          .style("text-shadow", "0 1px 2px rgba(0,0,0,0.8)")
          .text((d) => {
            const name = d.name || "";
            return name.length > 15 ? name.substring(0, 15) + "..." : name;
          });

        // Add tooltips
        node
          .append("title")
          .text(
            (d) =>
              `${d.name || "Unknown"}\nType: ${d.is_center ? "Center File" : "Related File"}\n${d.path || ""}`,
          );

        // Add click handler
        node.on("click", (event, d) => {
          event.stopPropagation();
          if (!d.is_center) {
            // Center the graph on this node
            fetchGraphData(d.id);
            addNotification(`Centering graph on: ${d.name}`, "info");
          }
        });

        // Add hover effects
        node.on("mouseenter", function (event, d) {
          d3.select(this)
            .select("circle")
            .transition()
            .duration(200)
            .attr("r", d.is_center ? 30 : 20)
            .attr("stroke", "#60a5fa")
            .attr("stroke-width", 4);

          // Highlight connected links
          link.style("stroke-opacity", (l) =>
            l.source.id === d.id || l.target.id === d.id ? 1 : 0.2,
          );
          link.style("stroke-width", (l) =>
            l.source.id === d.id || l.target.id === d.id ? 4 : 2,
          );
        });

        node.on("mouseleave", function (event, d) {
          d3.select(this)
            .select("circle")
            .transition()
            .duration(200)
            .attr("r", d.is_center ? 25 : 15)
            .attr("stroke", "#1e293b")
            .attr("stroke-width", 3);

          // Reset links
          link
            .style("stroke-opacity", 0.8)
            .style("stroke-width", (d) =>
              d.weight ? Math.max(1, d.weight * 4) : 2,
            );
        });

        // Update positions on tick
        graphSimulation.on("tick", () => {
          link
            .attr("x1", (d) => d.source.x)
            .attr("y1", (d) => d.source.y)
            .attr("x2", (d) => d.target.x)
            .attr("y2", (d) => d.target.y);

          node.attr("transform", (d) => `translate(${d.x},${d.y})`);
        });

        // Drag functions
        function dragstarted(event, d) {
          if (!event.active) graphSimulation.alphaTarget(0.3).restart();
          d.fx = d.x;
          d.fy = d.y;
          d3.select(this).style("cursor", "grabbing");
        }

        function dragged(event, d) {
          d.fx = event.x;
          d.fy = event.y;
        }

        function dragended(event, d) {
          if (!event.active) graphSimulation.alphaTarget(0);
          d.fx = null;
          d.fy = null;
          d3.select(this).style("cursor", "pointer");
        }

        // resetGraphZoom() uses the latest graphZoom + SVG state.
      }

      function cleanupGraph() {
        if (graphSimulation) {
          graphSimulation.stop();
          graphSimulation = null;
        }
      }

      async function fetchSystemStats() {
        try {
          const response = await fetch("/api/control/stats");
          if (!response.ok) {
            throw new Error(`Stats request failed (${response.status})`);
          }
          const stats = await response.json();
          state.systemStats = {
            ...stats,
            total_size: Number(stats.total_size || 0),
            last_indexed: stats.last_indexed || null,
          };
          render();
        } catch (error) {
          console.error("Error fetching system stats:", error);
          addNotification("Failed to load system stats", "error");
        }
      }

      async function startIndexing(force = false) {
        try {
          const response = await fetch("/api/control/index", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ force }),
          });
          const data = await response.json();
          if (data.status === "started") {
            addNotification(
              `Indexing started${force ? " (Full Re-index)" : ""}`,
              "success",
            );
            if (data.operation_id) {
              connectProgressWebSocket(data.operation_id);
            }
          } else if (data.status === "already_running") {
            addNotification("Indexer is already running", "info");
          }
          render();
        } catch (error) {
          addNotification("Failed to start indexing", "error");
          console.error("Indexing trigger error:", error);
        }
      }

      async function clearDatabase() {
        if (
          !confirm(
            "Are you sure you want to clear the entire database? This will remove all indexed metadata and embeddings!",
          )
        )
          return;

        try {
          const response = await fetch("/api/control/clear-db", {
            method: "POST",
          });
          const data = await response.json();
          if (data.status === "cleared") {
            addNotification("Database cleared successfully", "success");
            state.systemStats = null;
          }
          render();
        } catch (error) {
          addNotification("Failed to clear database", "error");
          console.error("Clear database error:", error);
        }
      }

      async function stopOperation(operationId) {
        if (!confirm("Are you sure you want to stop this operation?")) return;

        try {
          const response = await fetch(`/api/control/stop/${operationId}`, {
            method: "POST",
          });
          const data = await response.json();
          if (data.status === "stopped" || data.status === "cancelled") {
            addNotification("Operation stopped successfully", "success");
            state.activeProgress = null;
          } else {
            addNotification("Failed to stop operation", "error");
          }
          render();
        } catch (error) {
          addNotification("Error stopping operation", "error");
          console.error("Stop operation error:", error);
        }
      }

      function convertToCSV(results) {
        const headers = [
          "Name",
          "Path",
          "Extension",
          "Size (Bytes)",
          "Score",
          "Tags",
        ];
        const rows = results.map((r) => [
          r.name || "",
          r.path || "",
          r.extension || "",
          r.size_bytes || 0,
          (r.score || 0).toFixed(4),
          (r.tags || []).join("; "),
        ]);

        return [
          headers.join(","),
          ...rows.map((row) =>
            row
              .map((cell) => `"${String(cell).replace(/"/g, '""')}"`)
              .join(","),
          ),
        ].join("\n");
      }

      function exportGraph(format) {
        if (!state.graphData) {
          addNotification("No graph data to export", "error");
          return;
        }

        const timestamp = new Date().toISOString().split("T")[0];
        const filename = `graph-${state.graphData.center_file?.name?.replace(/[^a-z0-9]/gi, "_") || "file"}-${timestamp}`;

        if (format === "svg") {
          const svgElement = document.querySelector("#graphContainer svg");
          if (!svgElement) {
            addNotification("Graph not rendered yet", "error");
            return;
          }

          // Clone SVG to modify for export
          const clone = svgElement.cloneNode(true);
          clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
          clone.setAttribute("xmlns:xlink", "http://www.w3.org/1999/xlink");

          // Add styles
          const style = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "style",
          );
          style.textContent = `
                    text { font-family: Inter, sans-serif; }
                    line { stroke-linecap: round; }
                `;
          clone.insertBefore(style, clone.firstChild);

          const svgData = new XMLSerializer().serializeToString(clone);
          const svgBlob = new Blob([svgData], {
            type: "image/svg+xml;charset=utf-8",
          });
          const url = URL.createObjectURL(svgBlob);

          downloadURL(url, `${filename}.svg`);
          URL.revokeObjectURL(url);
          addNotification("Graph exported as SVG", "success");
        } else if (format === "png") {
          exportGraphAsPNG(filename);
        } else if (format === "json") {
          const dataStr = JSON.stringify(state.graphData, null, 2);
          downloadFile(dataStr, `${filename}.json`, "application/json");
          addNotification("Graph data exported as JSON", "success");
        }
      }

      function exportGraphAsPNG(filename) {
        const svgElement = document.querySelector("#graphContainer svg");
        if (!svgElement) {
          addNotification("Graph not rendered yet", "error");
          return;
        }

        const rect = svgElement.getBoundingClientRect();
        const canvas = document.createElement("canvas");
        canvas.width = rect.width * 2;
        canvas.height = rect.height * 2;
        const ctx = canvas.getContext("2d");

        // Set dark background
        ctx.fillStyle = "#0f172a";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const svgData = new XMLSerializer().serializeToString(svgElement);
        const img = new Image();
        const svgBlob = new Blob([svgData], {
          type: "image/svg+xml;charset=utf-8",
        });
        const url = URL.createObjectURL(svgBlob);

        img.onload = function () {
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          canvas.toBlob(function (blob) {
            const pngUrl = URL.createObjectURL(blob);
            downloadURL(pngUrl, `${filename}.png`);
            URL.revokeObjectURL(pngUrl);
            URL.revokeObjectURL(url);
            addNotification("Graph exported as PNG", "success");
          });
        };

        img.src = url;
      }

        }
      }

      function downloadFile(content, filename, mimeType) {
        const blob = new Blob([content], { type: mimeType });
        const url = URL.createObjectURL(blob);
        downloadURL(url, filename);
        URL.revokeObjectURL(url);
      }

      function downloadURL(url, filename) {
        const link = document.createElement("a");
        link.href = url;

        document.body.appendChild(link);
        link.click();

      }

      async function performTreeAnalysis(query) {
        const normalizedQuery = String(query || "").trim();
        if (!normalizedQuery) return;

        state.treeAnalysis = null;
        render();

        try {
          const response = await fetch("/api/tot/reason", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              seed_query: normalizedQuery,
              max_depth: 3,
              branching_factor: 3,
              exploration_strategy: "diversity",
            }),
          });

          if (!response.ok) {
            throw new Error(`Tree analysis failed (${response.status})`);
          }

          const rawTree = await response.json();
          state.treeAnalysis = normalizeTreePayload(rawTree, normalizedQuery);
          addNotification(
            `Tree analysis complete: ${state.treeAnalysis.analysis?.total_nodes || 0} nodes explored`,
            "success",
          );
          render();
        } catch (error) {
          console.error("Tree analysis error:", error);
          addNotification("Tree analysis failed", "error");
        }
      }

      function formatMessage(content) {
          if (!content) return "";
          
          // Code blocks with syntax highlighting placeholders
          content = content.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
              return `<pre class="bg-slate-900 p-3 rounded-lg my-2 overflow-x-auto border border-white/5"><code class="text-xs text-blue-300 font-mono">${code.trim()}</code></pre>`;
          });

          // Inline code
          content = content.replace(/`([^`]+)`/g, '<code class="bg-slate-700/50 px-1.5 py-0.5 rounded text-blue-200 font-mono text-xs border border-white/5">$1</code>');
          
          // Bold
          content = content.replace(/\*\*(.*?)\*\*/g, '<strong class="text-white font-semibold">$1</strong>');
          
          // Preserve line breaks for non-code text
          return content.split('\n').map(line => {
              if (line.includes('<pre') || line.includes('</pre>')) return line;
              return `<p class="mb-2 last:mb-0">${line}</p>`;
          }).join('\n');
      }

      async function sendChatMessage() {
          const query = state.chatInput.trim();
          if (!query || state.chatLoading) return;

          // Add user message to history
          state.chatHistory.push({ role: 'user', content: query });
          state.chatInput = "";
          state.chatLoading = true;
          render();

          // Scroll to bottom
          setTimeout(() => {
              const container = document.getElementById('chat-messages');
              if (container) container.scrollTop = container.scrollHeight;
          }, 0);

	          try {
	                const response = await fetch("/api/chat", {
	                    method: "POST",
	                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        query: query,
                        history: state.chatHistory.slice(0, -1), // Send history excluding current message (handled by backend or included?)
                        // Actually backend expects history WITHOUT the current query in the history list usually, 
                        // but `request.history` should probably be the context.
                        // My backend implementation: `chat_with_data` takes query and history.
                        // The `history` in `ChatRequest` should be previous messages.
	                        // So slice(0, -1) is correct if we already pushed to state.chatHistory.
	                    }),
	                });

	              if (!response.ok || !response.body) {
	                  throw new Error(`Chat request failed (${response.status})`);
	              }

	              const reader = response.body.getReader();
	              const decoder = new TextDecoder();
              
              // Add empty assistant message to start streaming into
              state.chatHistory.push({ role: 'assistant', content: "" });
              let currentMsgIndex = state.chatHistory.length - 1;

              while (true) {
                  const { done, value } = await reader.read();
                  if (done) break;
                  
                  const chunk = decoder.decode(value);
                  state.chatHistory[currentMsgIndex].content += chunk;
                  
                  // Re-render only the message content if possible, or full render
                  // For simplicity, full render (might be janky but works)
                  // Or direct DOM manipulation for smoother streaming
                  
                  render(); 
                  
                  // Auto scroll
                  const container = document.getElementById('chat-messages');
                  if (container) container.scrollTop = container.scrollHeight;
              }

          } catch (error) {
              console.error("Chat error:", error);
              state.chatHistory.push({ role: 'assistant', content: "_Error: Could not get response._" });
          } finally {
              state.chatLoading = false;
              render();
          }
      }

                            <button type="button" role="menuitem" class="w-full text-left px-3 py-2 hover:bg-white/10 text-sm" onclick="handleContextMenuAction('open')">Open details</button>
                            <button type="button" role="menuitem" class="w-full text-left px-3 py-2 hover:bg-white/10 text-sm" onclick="handleContextMenuAction('copyPath')">Copy path</button>
                            <button type="button" role="menuitem" class="w-full text-left px-3 py-2 hover:bg-white/10 text-sm" onclick="handleContextMenuAction('copyName')">Copy file name</button>
                            <button type="button" role="menuitem" class="w-full text-left px-3 py-2 hover:bg-white/10 text-sm" onclick="handleContextMenuAction('searchName')">Search by this name</button>
                            <button type="button" role="menuitem" class="w-full text-left px-3 py-2 hover:bg-white/10 text-sm" onclick="handleContextMenuAction('filterExtension')">Filter by extension</button>
                            <button type="button" role="menuitem" class="w-full text-left px-3 py-2 hover:bg-white/10 text-sm" onclick="handleContextMenuAction('exportOne')">Export this result</button>
                        </div>
                    </div>
                `;
        }

        return html;
      }

      // ============================================
      // Event Handlers
      // ============================================
      function setView(view) {
        state.view = view;
        state.showNotifications = false;
        state.contextMenu.visible = false;
        render();

        if (view === "insights" && !state.insights) {
          fetchInsights();
        }
      }

      function setSelectedFile(file) {
        state.selectedFile = file;
        state.contextMenu.visible = false;
        render();
      }

      function toggleSidebar() {
        state.sidebarCollapsed = !state.sidebarCollapsed;
        render();
      }

      function toggleNotifications() {
        state.showNotifications = !state.showNotifications;
        render();
      }

      function toggleSettings() {
        state.showSettings = !state.showSettings;
        if (state.showSettings) {
          state.contextMenu.visible = false;
        }
        render();
      }

      function updateSearchSuggestions(value) {
        if (!value) {
          state.searchSuggestions = [];
          render();
          return;
        }

        const suggestions = [
          `${value} in Python`,
          `${value} code examples`,
          `${value} configuration`,
          `How to ${value}`,
        ];

        state.searchSuggestions = suggestions;
        render();
      }

      // Close modals on escape
      document.addEventListener("keydown", (e) => {
        if (e.key === "/" && !e.metaKey && !e.ctrlKey && !e.altKey) {
          const tagName = (e.target && e.target.tagName) || "";
          if (!["INPUT", "TEXTAREA", "SELECT"].includes(tagName.toUpperCase())) {
            e.preventDefault();
            const searchInput =
              document.getElementById("viewSearchInput") ||
              document.getElementById("quickSearch");
            if (searchInput) {
              searchInput.focus();
              searchInput.select();
              announceForA11y("Search input focused");
            }
          }
        }

        if (e.key === "Escape") {
          if (state.contextMenu.visible) {
            closeContextMenu();
            return;
          }
          if (state.selectedFile) setSelectedFile(null);
          if (state.showSettings) toggleSettings();
          if (state.showNotifications) toggleNotifications();
        }
      });

      // Close notifications/settings when clicking outside
      document.addEventListener("click", (e) => {
        if (
          state.contextMenu.visible &&
          !e.target.closest(".file-context-menu")
        ) {
          state.contextMenu.visible = false;
          render();
          return;
        }

        if (state.showNotifications && !e.target.closest(".relative")) {
          state.showNotifications = false;
          render();
        }
      });

      // ============================================
      // PROGRESS TRACKING SYSTEM
      // ============================================

      // Progress state
      state.activeProgress = null;
      state.progressWebSocket = null;
      state.progressHistory = [];

      // Connect to progress WebSocket
      function connectProgressWebSocket(operationId) {
        if (state.progressWebSocket) {
          state.progressWebSocket.close();
        }

        const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
        const wsUrl = `${protocol}//${window.location.host}/ws/progress/${operationId}`;

        try {
          state.progressWebSocket = new WebSocket(wsUrl);

          state.progressWebSocket.onopen = () => {
            console.log("Progress WebSocket connected");
          };

          state.progressWebSocket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            handleProgressUpdate(data);
          };

          state.progressWebSocket.onclose = () => {
            console.log("Progress WebSocket closed");
          };

          state.progressWebSocket.onerror = (error) => {
            console.error("Progress WebSocket error:", error);
          };
        } catch (e) {
          console.error("Failed to connect to progress WebSocket:", e);
        }
      }

      // Handle progress updates
      function handleProgressUpdate(data) {
        if (data.type === "initial" || data.type === "progress") {
          const progressData = data.data || data;
          state.activeProgress = {
            operationId: progressData.operation_id,
            operationType: progressData.operation_type,
            progressPercent: progressData.progress_percent,
            itemsProcessed: progressData.items_processed,
            totalItems: progressData.total_items,
            etaSeconds: progressData.eta_seconds,
            etaFormatted: progressData.eta_formatted,
            itemsPerSecond: progressData.items_per_second,
            elapsedSeconds: progressData.elapsed_seconds,
            currentItem: progressData.current_item || "",
            statusMessage: progressData.status_message || "",
            status: progressData.status,
            isPaused: progressData.is_paused,
            type: data.type,
          };

          // Add to history
          state.progressHistory.push({
            timestamp: Date.now(),
            progress: state.activeProgress.progressPercent,
          });

          // Keep only last 100 history points
          if (state.progressHistory.length > 100) {
            state.progressHistory = state.progressHistory.slice(-100);
          }

          render();
        } else if (data.type === "completed") {
          addNotification("Operation completed successfully", "success");
          state.activeProgress = null;
          fetchSystemStats();
          render();

          if (state.progressWebSocket) {
            state.progressWebSocket.close();
            state.progressWebSocket = null;
          }
        } else if (data.type === "cancelled" || data.type === "error") {
          addNotification(
            `Operation ${data.type === "cancelled" ? "stopped" : "failed"}`,
            data.type === "error" ? "error" : "info",
          );
          state.activeProgress = null;
          render();

          if (state.progressWebSocket) {
            state.progressWebSocket.close();
            state.progressWebSocket = null;
          }
        } else if (data.type === "paused") {
          if (state.activeProgress) {
            state.activeProgress.isPaused = true;
            state.activeProgress.status = "paused";
            render();
          }
        } else if (data.type === "resumed") {
          if (state.activeProgress) {
            state.activeProgress.isPaused = false;
            state.activeProgress.status = "running";
            render();
          }
        }
      }

      // Progress control functions
      async function pauseProgress() {
        if (!state.activeProgress) return;

        try {
          await fetch(
            `/api/control/pause/${state.activeProgress.operationId}`,
            {
              method: "POST",
            },
          );
        } catch (e) {
          console.error("Failed to pause:", e);
        }
      }

      async function resumeProgress() {
        if (!state.activeProgress) return;

        try {
          await fetch(
            `/api/control/resume/${state.activeProgress.operationId}`,
            {
              method: "POST",
            },
          );
        } catch (e) {
          console.error("Failed to resume:", e);
        }
      }

      async function cancelProgress() {
        if (!state.activeProgress) return;

        try {
          await fetch(
            `/api/control/stop/${state.activeProgress.operationId}`,
            {
              method: "POST",
            },
          );
        } catch (e) {
          console.error("Failed to cancel:", e);
        }
      }

      // Start indexing with progress
      async function startIndexingWithProgress(force = false) {
        try {
          const response = await fetch("/api/control/index", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ force }),
          });

          const data = await response.json();

          if (data.status === "already_running") {
            addNotification("Indexer is already running", "info");
            return;
          }

          if (!response.ok || !data.operation_id) {
            throw new Error(data.detail || `Index request failed (${response.status})`);
          }

          state.activeProgress = {
            operationId: data.operation_id,
            progressPercent: 0,
            itemsProcessed: 0,
            totalItems: 100,
            etaSeconds: 0,
            etaFormatted: "Calculating...",
            itemsPerSecond: 0,
            elapsedSeconds: 0,
            currentItem: "Initializing indexer...",
            statusMessage: force
              ? "Starting full re-index..."
              : "Scanning for new files...",
            status: "starting",
            isPaused: false,
            type: "initial",
            operationType: "indexing",
          };

          connectProgressWebSocket(data.operation_id);
          render();
          addNotification(
            force ? "Full re-index started" : "Indexing started",
            "success",
          );
        } catch (e) {
          console.error("Failed to start indexing:", e);
          addNotification("Failed to start indexing", "error");
        }
      }

      // Start reorganization with progress
      async function startReorganizationWithProgress(dryRun = true) {
        addNotification(
          "Reorganization pipeline is not available yet. Starting indexing instead.",
          "info",
        );
        await startIndexingWithProgress(!dryRun);
      }

      // Start export with progress
      async function startExportWithProgress(exportType) {
        try {
          const safeType = encodeURIComponent(String(exportType || "files"));
          const url = `/export/${safeType}?format=json`;
          const link = document.createElement("a");
          link.href = url;
          link.download = `${safeType}-export.json`;
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          addNotification("Export started", "success");
        } catch (e) {
          console.error("Failed to start export:", e);
          addNotification("Failed to export data", "error");
        }
      }

      // ============================================
      // Initialize
      // ============================================
      function init() {
        console.log("🚀 Initializing application...");
        try {
          applySettingsToDocument();
          fetchStats();
          render();
          console.log("✅ Application initialized successfully");
          // Apply syntax highlighting after initial render
          setTimeout(() => {
            if (typeof hljs !== "undefined") {
              hljs.highlightAll();
            }
          }, 100);
        } catch (e) {
          console.error("❌ Initialization error:", e);
          document.getElementById("app").innerHTML = `
                    <div style="color: white; padding: 20px; text-align: center;">
                        <h2>⚠️ Error Loading Application</h2>
                        <p>${e.message}</p>
                        <p>Check browser console for details (F12)</p>
                        <button onclick="location.reload()" style="padding: 10px 20px; margin-top: 20px; cursor: pointer;">Reload</button>
                    </div>
                `;
        }
      }

      // Override render to apply syntax highlighting
      try {
        const originalRender = render;
        render = function () {
          originalRender();
          // Apply syntax highlighting after DOM update
          setTimeout(() => {
            if (typeof hljs !== "undefined") {
              hljs.highlightAll();
            }
          }, 50);
        };
      } catch (e) {
        console.error("❌ Render override error:", e);
      }

      // Start the application
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", init);
      } else {
        init();
      }
    </script>
  </body>
</html>
