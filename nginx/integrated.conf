    }
    
    # Apex
    location /api/apex/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://apex_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # CyberArchitect
    location /api/cyberarchitect/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://cyberarchitect_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Primus
    location /api/primus/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://primus_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Acropolis
    location /api/acropolis/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://acropolis_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Citadel A+
    location /api/citadelaplus/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://citadelaplus_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # ── Health endpoint for nginx itself ──────────────────────────
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # ── Default: redirect to console ────────────────────────────
    location / {
        return 302 /console/;
    }
    
    # ── Error pages ───────────────────────────────────────────
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
