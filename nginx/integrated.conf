# ReliantAI Platform — Integrated Nginx Configuration
# Serves: Console (design system), Dashboard, JIT OS frontend, and proxies all APIs
# ================================================================

upstream money_backend { server money:8000; }
upstream complianceone_backend { server complianceone:8001; }
upstream finops360_backend { server finops360:8002; }
upstream growthengine_backend { server growthengine:8003; }
upstream reliant_os_backend { server reliant-os-backend:8004; }
upstream integration_backend { server integration:8080; }
upstream event_bus_backend { server event-bus:8081; }
upstream mcp_bridge_backend { server mcp-bridge:8083; }
upstream health_aggregator_backend { server health-aggregator:8086; }
upstream orchestrator_backend { server orchestrator:9000; }
upstream ops_intelligence_backend { server ops-intelligence:8050; }
upstream gen_h_backend { server gen-h:8040; }
upstream sentinel_backend { server sentinel:8060; }
upstream apex_backend { server apex:8070; }
upstream cyberarchitect_backend { server cyberarchitect:8090; }
upstream primus_backend { server primus:8088; }
upstream acropolis_backend { server acropolis:8089; }
upstream citadelaplus_backend { server citadelaplus:8086; }

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=strict:10m rate=10r/s;

server {
    listen 80;
    server_name localhost;
    
    # ── Global settings ───────────────────────────────────────
    client_max_body_size 50M;
    proxy_read_timeout 300s;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # ── Console (Design System) — served at /console ────────────
    location /console {
        alias /usr/share/nginx/console;
        index index.html;
        try_files $uri $uri/ /console/index.html;
        
        # Cache static assets
        location ~* \.(js|css|svg|png|jpg|jpeg|gif|ico|woff|woff2)$ {
            expires 1d;
            add_header Cache-Control "public, immutable";
        }
    }
    
    # ── Dashboard (legacy) — served at /dashboard ───────────────
    location /dashboard {
        alias /usr/share/nginx/dashboard;
        index index.html;
        try_files $uri $uri/ =404;
    }
    
    # ── JIT OS Frontend — served at /os ───────────────────────
    location /os {
        alias /usr/share/nginx/os;
        index index.html;
        try_files $uri $uri/ /os/index.html;
    }
    
    # ── API Gateway — all services proxied under /api/<service> ──
    
    # Money Service
    location /api/money/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://money_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # ComplianceOne
    location /api/complianceone/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://complianceone_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # FinOps360
    location /api/finops360/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://finops360_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # GrowthEngine
    location /api/growthengine/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://growthengine_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Reliant OS Backend
    location /api/os/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://reliant_os_backend/api/os/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Integration Layer
    location /api/integration/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://integration_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Event Bus
    location /api/events/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://event_bus_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # MCP Bridge (AI tool access)
    location /api/mcp/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://mcp_bridge_backend/mcp/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Health Aggregator
    location /api/health/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://health_aggregator_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Orchestrator
    location /api/orchestrator/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://orchestrator_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Ops-Intelligence
    location /api/ops-intelligence/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://ops_intelligence_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Gen-H
    location /api/gen-h/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://gen_h_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Sentinel
    location /api/sentinel/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://sentinel_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
