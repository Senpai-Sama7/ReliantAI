# ReliantAI Platform — Integrated Nginx Configuration
# Serves: Console (design system), Dashboard, JIT OS frontend, and proxies all APIs
# ================================================================

# Use Docker's internal DNS resolver so upstreams resolve at request time
# This prevents nginx from failing at startup when some services are down
resolver 127.0.0.11 valid=30s ipv6=off;

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=strict:10m rate=10r/s;

server {
    listen 80;
    server_name localhost;
    
    # ── Global settings ───────────────────────────────────────
    client_max_body_size 50M;
    proxy_read_timeout 300s;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # ── Console (Design System) — served at /console ────────────
    location /console {
        alias /usr/share/nginx/console;
        index index.html;
        try_files $uri $uri/ /console/index.html;
        
        location ~* \.(js|css|svg|png|jpg|jpeg|gif|ico|woff|woff2)$ {
            expires 1d;
            add_header Cache-Control "public, immutable";
        }
    }
    
    # ── Dashboard (legacy) — served at /dashboard ───────────────
    location /dashboard {
        alias /usr/share/nginx/dashboard;
        index index.html;
        try_files $uri $uri/ =404;
    }
    
    # ── JIT OS Frontend — served at /os ───────────────────────
    location /os {
        alias /usr/share/nginx/os;
        index index.html;
        try_files $uri $uri/ /os/index.html;
    }
    
    # ── API Gateway — all services proxied under /api/<service> ──
    
    # Money Service
    location /api/money/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://money:8000/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # ComplianceOne
    location /api/complianceone/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://complianceone:8001/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # FinOps360
    location /api/finops360/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://finops360:8002/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # GrowthEngine
    location /api/growthengine/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://growthengine:8003/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Reliant OS Backend
    location /api/os/ {
        limit_req zone=api burst=20 nodelay;
        set $os_backend "http://reliant-os-backend:8004";
        proxy_pass $os_backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Integration Layer
    location /api/integration/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://integration:8080/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Event Bus
    location /api/events/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://event-bus:8081/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # MCP Bridge (AI tool access)
    location /api/mcp/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://mcp-bridge:8083/mcp/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Health Aggregator
    location /api/health/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://health-aggregator:8086/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Orchestrator
    location /api/orchestrator/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://orchestrator:9000/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # ── Health endpoint for nginx itself ──────────────────────────
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # ── Default: redirect to console ────────────────────────────
    location / {
        return 302 /console/;
    }
    
    # ── Error pages ───────────────────────────────────────────
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
