user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # ── Circuit Breaker / Resilient Upstream Configuration ─────────────────
    #
    # max_fails=3  → After 3 consecutive health check failures, mark server down
    # fail_timeout=30s → Mark down for 30s before retrying
    # backup directive → Secondary server activated when primaries are down
    # proxy_next_upstream → Retry specific errors on another upstream server
    #
    # This provides infrastructure-level circuit breaking:
    #   - Automatic failover (backup servers)
    #   - Error isolation (failing server removed from rotation)
    #   - Retry with backoff (proxy_next_upstream + proxy_next_upstream_timeout)

    upstream money_backend {
        least_conn;
        server money:8000 max_fails=3 fail_timeout=30s;
        # Backup: return 503 with Retry-After header if all primaries fail
        server 127.0.0.1:9001 backup;
        keepalive 32;
    }

    upstream complianceone_backend {
        least_conn;
        server complianceone:8001 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:9002 backup;
        keepalive 32;
    }

    upstream finops360_backend {
        least_conn;
        server finops360:8002 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:9003 backup;
        keepalive 32;
    }

    upstream orchestrator_backend {
        least_conn;
        server orchestrator:9000 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:9004 backup;
        keepalive 32;
    }

    upstream integration_backend {
        least_conn;
        server integration:8080 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:9005 backup;
        keepalive 32;
    }

    upstream bap_backend {
        least_conn;
        server bap:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream apex_agents_backend {
        least_conn;
        server apex-agents:8001 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream citadel_backend {
        least_conn;
        server citadel:8100 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream ops_intelligence_backend {
        least_conn;
        server ops-intelligence-backend:8095 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream cleardesk_frontend {
        server cleardesk:80;
        keepalive 32;
    }

    upstream genh_frontend {
        server gen-h:80;
        keepalive 32;
    }

    upstream regenesis_frontend {
        server regenesis:80;
        keepalive 32;
    }

    upstream apex_ui_frontend {
        server apex-ui:3000;
        keepalive 32;
    }

    # Fallback / circuit-open response servers (localhost — nginx handles these)
    server {
        listen 127.0.0.1:9001;
        return 503 "{\"status\":\"unavailable\",\"service\":\"money\",\"retry_after\":30}";
        add_header Content-Type application/json;
        add_header Retry-After 30;
    }
    server {
        listen 127.0.0.1:9002;
        return 503 "{\"status\":\"unavailable\",\"service\":\"complianceone\",\"retry_after\":30}";
        add_header Content-Type application/json;
        add_header Retry-After 30;
    }
    server {
        listen 127.0.0.1:9003;
        return 503 "{\"status\":\"unavailable\",\"service\":\"finops360\",\"retry_after\":30}";
        add_header Content-Type application/json;
        add_header Retry-After 30;
    }
    server {
        listen 127.0.0.1:9004;
        return 503 "{\"status\":\"unavailable\",\"service\":\"orchestrator\",\"retry_after\":30}";
        add_header Content-Type application/json;
        add_header Retry-After 30;
    }
    server {
        listen 127.0.0.1:9005;
        return 503 "{\"status\":\"unavailable\",\"service\":\"integration\",\"retry_after\":30}";
        add_header Content-Type application/json;
        add_header Retry-After 30;
    }

    # HTTP to HTTPS redirect
    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Redirect to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL configuration
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' ws: wss:;" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # Health check endpoint
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ── Proxy defaults (circuit breaker / retry / timeout) ───────────
        proxy_connect_timeout 15s;
        proxy_send_timeout    30s;
        proxy_read_timeout    60s;
        proxy_next_upstream   error timeout invalid_header http_502 http_503 http_504;
        proxy_next_upstream_tries 2;

        # Money Service
        location /api/money/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://money_backend/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ComplianceOne Service
        location /api/compliance/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://complianceone_backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # FinOps360 Service
        location /api/finops/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://finops360_backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Orchestrator Service
        location /api/orchestrator/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://orchestrator_backend/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # WebSocket support
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Integration Service
        location /api/integration/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://integration_backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # B-A-P Service
        location /api/bap/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://bap_backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Apex Agents Service
        location /api/agents/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://apex_agents_backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Citadel Service
        location /api/citadel/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://citadel_backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Ops Intelligence Backend
        location /api/ops-intelligence/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://ops_intelligence_backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ClearDesk Frontend
        location /cleardesk {
            proxy_pass http://cleardesk_frontend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Gen-H Frontend
        location /gen-h {
            proxy_pass http://genh_frontend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # reGenesis Frontend
        location /regenesis {
            proxy_pass http://regenesis_frontend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Apex UI Frontend
        location /apex-ui {
            proxy_pass http://apex_ui_frontend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Dashboard (static files)
        location /dashboard {
            alias /usr/share/nginx/html/dashboard;
            try_files $uri $uri/ /dashboard/index.html;
            add_header Cache-Control "public, max-age=300";
        }

        # Default fallback
        location / {
            return 404;
        }
    }
}
