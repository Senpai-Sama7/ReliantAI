<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body,#root{height:100%;background:#020510;}
body{font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}

::-webkit-scrollbar-thumb{background:#1c2b3c;border-radius:2px;}

@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.85)}}

<body>
<div id="root"></div>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel">

// ── Design Tokens ──────────────────────────────────────────────
const C = {
  bg:      '#051424',
  s0:      '#010f1f',
  s1:      '#0d1c2d',
  s2:      '#122131',
  s3:      '#1c2b3c',
  s4:      '#273647',
  text:    '#d4e4fa',
  dim:     '#8a9bb5',
  muted:   '#4a5e75',
  orange:  '#FF6E00',
  orangeL: '#ffb692',
  orangeD: 'rgba(255,110,0,0.15)',
  green:   '#22c55e',
  greenD:  'rgba(34,197,94,0.12)',
  red:     '#ef4444',
  redD:    'rgba(239,68,68,0.12)',
  blue:    '#60a5fa',
  blueD:   'rgba(96,165,250,0.12)',
  border:  '#1c2b3c',
};
const SG = "'Space Grotesk', sans-serif";
const IN = "'Inter', sans-serif";
const R = { sm:8, md:12, lg:16, xl:20, full:9999 };

// ── Shared Components ─────────────────────────────────────────
const Chip = ({label, color='#8a9bb5', bg='rgba(255,255,255,0.06)'}) => (
  <span style={{fontFamily:IN,fontSize:11,fontWeight:600,letterSpacing:'0.04em',textTransform:'uppercase',
    padding:'3px 8px',borderRadius:R.full,background:bg,color,whiteSpace:'nowrap'}}>{label}</span>
);

const StatusChip = ({status}) => {
  const map = {
    NEW:       [C.green,  C.greenD],
    ACTIVE:    [C.orange, C.orangeD],
    RUNNING:   [C.orange, C.orangeD],
    QUALIFIED: [C.blue,   C.blueD],
    PAUSED:    [C.dim,    'rgba(138,155,181,0.1)'],
    CONVERTED: [C.green,  C.greenD],
    DRAFT:     [C.muted,  'rgba(74,94,117,0.12)'],
    HOT:       [C.red,    C.redD],
    WARM:      [C.orange, C.orangeD],
    COLD:      [C.blue,   C.blueD],
  };
  const [color,bg] = map[status]||[C.dim,'rgba(255,255,255,0.06)'];
  return <Chip label={status} color={color} bg={bg}/>;
};

const Card = ({children, style={}}) => (
  <div style={{background:`linear-gradient(135deg, ${C.s1} 0%, rgba(18,33,49,0.7) 100%)`,borderRadius:R.lg,border:`1px solid rgba(255,110,0,0.08)`,overflow:'hidden',...style}}>
    {children}
  </div>
);

const MetricCard = ({label,value,sub,color=C.orange,icon}) => (
  <div style={{flex:1,background:`linear-gradient(135deg, ${C.s1} 0%, ${C.s2} 100%)`,borderRadius:R.lg,border:`1px solid rgba(255,110,0,0.1)`,padding:'14px 12px',boxShadow:'0 2px 12px rgba(0,0,0,0.2)'}}>
    <div style={{fontSize:11,fontFamily:IN,fontWeight:600,color:C.dim,letterSpacing:'0.04em',textTransform:'uppercase',marginBottom:6}}>{label}</div>
    <div style={{fontFamily:SG,fontSize:22,fontWeight:700,color,letterSpacing:'-0.01em',lineHeight:1}}>{value}</div>
    {sub && <div style={{fontSize:11,fontFamily:IN,color:C.dim,marginTop:4}}>{sub}</div>}
  </div>
);

const ScoreRing = ({score}) => {
  const color = score>=80?C.green:score>=55?C.orange:C.red;
  const r=12, circ=2*Math.PI*r;
  const dash = (score/100)*circ;
  return (
    <div style={{position:'relative',width:36,height:36,flexShrink:0}}>
      <svg width="36" height="36" style={{transform:'rotate(-90deg)'}}>
        <circle cx="18" cy="18" r={r} fill="none" stroke={C.s3} strokeWidth="2.5"/>
        <circle cx="18" cy="18" r={r} fill="none" stroke={color} strokeWidth="2.5"
          strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"/>
      </svg>
      <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',
        fontFamily:SG,fontSize:10,fontWeight:700,color}}>{score}</div>
    </div>
  );
};

const ShieldLogo = ({size=28}) => (

    <circle cx="20" cy="10" r="1.8" fill={C.orangeL} opacity="0.7"/>

    <circle cx="20" cy="20" r="1.8" fill={C.orangeL} opacity="0.7"/>
    <line x1="8" y1="10" x2="14" y2="15" stroke={C.orange} strokeWidth="0.8" opacity="0.5"/>
    <line x1="20" y1="10" x2="14" y2="15" stroke={C.orange} strokeWidth="0.8" opacity="0.5"/>
    <line x1="8" y1="20" x2="14" y2="15" stroke={C.orange} strokeWidth="0.8" opacity="0.5"/>

          )}
        </button>
        <button onClick={()=>onNavigate('campaigns')} style={{

        <Card style={{padding:'16px'}}>

            <div>

            </div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
            {[['Discover','12 leads','#22c55e'],['Engage','48 active','#FF6E00'],['Convert','7 today','#60a5fa']].map(([phase,val,c])=>(
              <div key={phase} style={{background:C.s2,borderRadius:R.sm,padding:'10px 10px 8px',textAlign:'center'}}>

        <div style={{display:'flex',flexDirection:'column',gap:1,borderRadius:R.lg,overflow:'hidden',border:`1px solid ${C.border}`}}>
          {feed.slice(0,6).map((item,i)=>(
            <div key={item.id} style={{

                <div style={{fontFamily:IN,fontSize:11,color:C.dim,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{item.sub}</div>
              </div>
              <div style={{fontFamily:IN,fontSize:10,color:C.muted,flexShrink:0,paddingTop:1}}>{item.time}</div>
            </div>
          ))}
        </div>
      </div>
    </div>

};

              <div style={{fontFamily:SG,fontSize:10,fontWeight:700,color:s.status==='DOWN'?C.red:C.text,lineHeight:1.2}}>{s.name}</div>
            </div>
          ))}
        </div>

        <button style={{width:'100%',height:44,borderRadius:R.md,border:`1.5px solid rgba(239,68,68,0.3)`,cursor:'pointer',background:'rgba(239,68,68,0.06)',color:C.red,fontFamily:SG,fontSize:14,fontWeight:600}}>
          Sign Out
        </button>
      </div>
    </div>
  );
};

// ── Bottom Tab Nav ────────────────────────────────────────────
const TABS = [
  { id:'dashboard',  label:'Home',      icon:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg> },
  { id:'leads',      label:'Leads',     icon:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg> },
  { id:'campaigns',  label:'Campaigns', icon:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/></svg> },
  { id:'conversions',label:'Convert',   icon:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg> },

];

const BottomNav = ({ tab, setTab, unreadCount=0 }) => (
  <div style={{position:'absolute',bottom:0,left:0,right:0,height:82,background:'rgba(13,28,45,0.96)',backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',borderTop:`1px solid rgba(255,110,0,0.1)`,display:'flex',paddingBottom:20}}>
    {TABS.map(t=>{
      const active = tab===t.id;
      return (
        <div key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:3,cursor:'pointer',paddingTop:8}}>
          <div style={{color:active?C.orange:C.muted,transition:'color 150ms',position:'relative'}}>{t.icon}{t.id==='notifications'&&unreadCount>0&&<div style={{position:'absolute',top:-2,right:-4,width:12,height:12,borderRadius:R.full,background:C.red,border:`1.5px solid ${C.bg}`,fontSize:7,fontWeight:700,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center'}}>{unreadCount}</div>}</div>
          <div style={{fontFamily:IN,fontSize:9,fontWeight:active?700:400,color:active?C.orange:C.muted,transition:'color 150ms',letterSpacing:'0.02em'}}>{t.label}</div>
          {active && <div style={{position:'absolute',bottom:62,width:20,height:2,borderRadius:1,background:C.orange}}/>}
        </div>
      );
    })}
  </div>
);


// ── SCREEN: Notifications (Mobile) ───────────────────────────
const MOBILE_NOTIFS = [
  { id:'mn001', cat:'ALERT',      service:'money',       color:'#ef4444', title:'LIFE_SAFETY — DSP-2025-8821', body:'Rodriguez dispatched · 4821 Westheimer Rd · ETA 8 min', ts:'14:32', read:false },
  { id:'mn002', cat:'ALERT',      service:'apex',        color:'#7c5cfc', title:'HITL required: wf-a9c3-d812',  body:'Confidence 0.63 · Stakes HIGH · Decision pending', ts:'14:31', read:false },
  { id:'mn003', cat:'ALERT',      service:'cleardesk',   color:'#00d4aa', title:'Document escalated: INV-0441', body:'$52,400 · Confidence 0.61 below threshold', ts:'14:31', read:false },
  { id:'mn004', cat:'INSIGHT',    service:'bap',         color:'#FF6E00', title:'Anomaly: dispatch surge +340%', body:'96°F heat event driving volume spike', ts:'14:29', read:false },
  { id:'mn005', cat:'CONVERSION', service:'money',       color:'#22c55e', title:'Conversion: Martinez HVAC',    body:'Revenue attributed: $8,400 · Reply time: 4 min', ts:'14:18', read:true },
  { id:'mn006', cat:'SYSTEM',     service:'integration', color:'#00ff7a', title:'Saga sg-0041 completed',       body:'3/3 steps · cleardesk pipeline · 3.2s', ts:'14:30', read:true },
  { id:'mn007', cat:'INSIGHT',    service:'bap',         color:'#FF6E00', title:'Q2 pipeline risk: 3 accounts', body:'Martinez, TexOil, Gulf Coast — 60-day DSO breach', ts:'13:45', read:true },

];

const CAT_MAP = {
  ALERT:      { color:'#ef4444', bg:'rgba(239,68,68,0.12)',   border:'rgba(239,68,68,0.25)' },
  INSIGHT:    { color:'#FF6E00', bg:'rgba(255,110,0,0.12)',   border:'rgba(255,110,0,0.25)' },
  CONVERSION: { color:'#22c55e', bg:'rgba(34,197,94,0.12)',   border:'rgba(34,197,94,0.25)' },
  SYSTEM:     { color:'#8a9bb5', bg:'rgba(138,155,181,0.1)', border:'rgba(138,155,181,0.2)' },
};

const NotificationsScreenMobile = () => {
  const [notifs, setNotifs] = React.useState(MOBILE_NOTIFS);
  const [filter, setFilter] = React.useState('ALL');
  const markAllRead = () => setNotifs(n => n.map(x=>({...x,read:true})));
  const markRead = id => setNotifs(n => n.map(x=>x.id===id?{...x,read:true}:x));

  const cats = ['ALL','ALERT','INSIGHT','CONVERSION','SYSTEM'];
  const filtered = filter==='ALL' ? notifs : notifs.filter(n=>n.cat===filter);
  const unread = notifs.filter(n=>!n.read).length;

  return (
    <div style={{flex:1,display:'flex',flexDirection:'column'}}>
      {/* Header */}
      <div style={{padding:'8px 20px 12px',flexShrink:0}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <div>
            <div style={{fontFamily:SG,fontSize:20,fontWeight:700,color:C.text,letterSpacing:'-0.01em'}}>Notifications</div>
            {unread>0&&<div style={{fontFamily:IN,fontSize:11,color:C.dim}}>{unread} unread</div>}
          </div>
          {unread>0&&(
            <button onClick={markAllRead} style={{padding:'5px 12px',borderRadius:R.full,border:'1px solid rgba(255,110,0,0.3)',background:'rgba(255,110,0,0.08)',color:C.orange,fontFamily:SG,fontSize:11,fontWeight:700,cursor:'pointer'}}>
              All read
            </button>
          )}
        </div>
        {/* Category pills */}
        <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:2}}>
          {cats.map(c=>{
            const count = c==='ALL'?unread:notifs.filter(n=>n.cat===c&&!n.read).length;
            const cs = CAT_MAP[c]||{};
            return (
              <div key={c} onClick={()=>setFilter(c)} style={{
                padding:'4px 12px',borderRadius:R.full,cursor:'pointer',whiteSpace:'nowrap',
                background:filter===c?(cs.bg||C.orangeD):'transparent',
                color:filter===c?(cs.color||C.orange):C.dim,
                border:`1px solid ${filter===c?(cs.border||'rgba(255,110,0,0.3)'):C.border}`,
                fontFamily:IN,fontSize:11,fontWeight:600,
                display:'flex',alignItems:'center',gap:5,transition:'all 150ms',
              }}>
                {c}
                {count>0&&<span style={{fontSize:9,background:'rgba(255,255,255,0.1)',borderRadius:R.full,padding:'0 4px',lineHeight:'14px'}}>{count}</span>}
              </div>
            );
          })}
        </div>
      </div>

      {/* Feed */}
      <div style={{flex:1,overflowY:'auto',paddingBottom:90}}>
        <div style={{padding:'0 20px',display:'flex',flexDirection:'column',gap:1,borderRadius:R.lg,overflow:'hidden',border:`1px solid ${C.border}`,margin:'0 20px'}}>
          {filtered.map((n,i)=>{
            const cs = CAT_MAP[n.cat]||{color:C.dim,bg:'rgba(255,255,255,0.04)',border:C.border};
            return (
              <div key={n.id} onClick={()=>markRead(n.id)} style={{
                display:'flex',gap:10,padding:'12px 14px',cursor:'pointer',
                background: n.read?C.s1:'rgba(255,110,0,0.03)',
                borderBottom:i<filtered.length-1?`1px solid ${C.border}`:'none',
                transition:'background 150ms',
              }}>
                <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,paddingTop:2,flexShrink:0}}>
                  <div style={{width:8,height:8,borderRadius:R.full,background:n.read?C.s3:n.color,boxShadow:n.read?'none':`0 0 5px ${n.color}70`}}/>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:3}}>
                    <span style={{fontSize:9,fontWeight:700,padding:'2px 6px',borderRadius:R.sm,background:cs.bg,color:cs.color,border:`1px solid ${cs.border}`,fontFamily:IN,letterSpacing:'0.04em'}}>{n.cat}</span>
                    <span style={{fontFamily:IN,fontSize:9,color:C.muted}}>{n.service}</span>
                    {!n.read&&<div style={{width:5,height:5,borderRadius:R.full,background:C.orange,marginLeft:'auto',flexShrink:0}}/>}
                  </div>
                  <div style={{fontFamily:SG,fontSize:13,fontWeight:n.read?400:700,color:n.read?C.dim:C.text,marginBottom:2,lineHeight:1.3}}>{n.title}</div>
                  <div style={{fontFamily:IN,fontSize:11,color:C.muted,lineHeight:1.4}}>{n.body}</div>
                </div>
                <div style={{fontFamily:IN,fontSize:9,color:C.muted,flexShrink:0,paddingTop:2}}>{n.ts}</div>
              </div>
            );
          })}
          {filtered.length===0&&<div style={{padding:40,textAlign:'center',fontFamily:IN,fontSize:12,color:C.muted}}>No {filter!=='ALL'?filter.toLowerCase()+' ':''}notifications.</div>}
        </div>
      </div>
    </div>
  );
};

// ── App ───────────────────────────────────────────────────────
const App = () => {
  const saved = (() => { try { return JSON.parse(localStorage.getItem('ra-mobile-state')||'{}'); } catch{ return {}; } })();
  const [tab, setTab] = React.useState(saved.tab||'dashboard');

  const navigate = (t) => {
    setTab(t);
    localStorage.setItem('ra-mobile-state', JSON.stringify({tab:t}));
  };

  const setTabAndSave = (t) => navigate(t);

  const screens = {
    dashboard:   <DashboardScreen  onNavigate={navigate}/>,
    leads:       <LeadDiscoveryScreen/>,
    campaigns:   <CampaignsScreen/>,
    conversions: <ConversionsScreen/>,
    settings:    <SettingsScreen/>,
    notifications: <NotificationsScreenMobile/>,
  };

  return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'#010308',padding:'20px 0',backgroundImage:'radial-gradient(ellipse 50% 40% at 50% 0%, rgba(255,110,0,0.06) 0%, transparent 70%), radial-gradient(ellipse 40% 30% at 90% 100%, rgba(124,92,252,0.05) 0%, transparent 70%)'}}>
      <IOSDevice>
        <IOSStatusBar dark time="9:41"/>
        <div style={{flex:1,display:'flex',flexDirection:'column',background:'linear-gradient(180deg, #051424 0%, #030e1c 100%)',position:'relative',overflow:'hidden'}}>
          <div key={tab} style={{flex:1,display:'flex',flexDirection:'column',animation:'fade 150ms ease',overflow:'hidden'}}>
            {screens[tab]}
          </div>
          <BottomNav tab={tab} setTab={setTabAndSave} unreadCount={4}/>
        </div>
      </IOSDevice>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
