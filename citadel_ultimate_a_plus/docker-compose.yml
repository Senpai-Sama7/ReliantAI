services:
  citadel-dashboard:
    build: .
    container_name: citadel-dashboard
    env_file:
      - .env
    ports:
      - "127.0.0.1:8888:8888"
    volumes:
      - ./workspace:/app/workspace
      - ./market:/app/market
    command: ["python", "-m", "uvicorn", "dashboard_app:app", "--host", "0.0.0.0", "--port", "8888"]
    restart: unless-stopped
