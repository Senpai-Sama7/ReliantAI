<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020510;font-family:'IBM Plex Sans',sans-serif;padding:20px;display:flex;gap:8px;flex-wrap:wrap;align-items:flex-start}
.swatch{flex:1;min-width:120px;border:1px solid #0c1a2c;padding:16px 12px 12px}
.swatch-block{height:52px;margin-bottom:10px}
.token{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#4a6880;display:block;margin-bottom:2px}
.hex{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#a8c4de;font-weight:500}
.name{font-size:11px;color:#4a6880;margin-top:4px}
</style></head><body>
<div class="swatch">
  <div class="swatch-block" style="background:#020510;border:1px solid #0c1a2c"></div>
  <span class="token">--re-bg</span>
  <span class="hex">#020510</span>
  <div class="name">Page Root</div>
</div>
<div class="swatch">
  <div class="swatch-block" style="background:#060c1a;border:1px solid #0c1a2c"></div>
  <span class="token">--re-surface</span>
  <span class="hex">#060c1a</span>
  <div class="name">Card / Panel</div>
</div>
<div class="swatch">
  <div class="swatch-block" style="background:#091424;border:1px solid #0c1a2c"></div>
  <span class="token">--re-surface-hi</span>
  <span class="hex">#091424</span>
  <div class="name">Modal / Hover Row</div>
</div>
<div class="swatch">
  <div class="swatch-block" style="background:#0d1e35;border:1px solid #152637"></div>
  <span class="token">--re-surface-pop</span>
  <span class="hex">#0d1e35</span>
  <div class="name">Tooltip / Dropdown</div>
</div>
</body></html>
