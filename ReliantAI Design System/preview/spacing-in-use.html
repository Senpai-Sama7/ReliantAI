<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020510;font-family:'IBM Plex Sans',sans-serif;padding:20px;display:flex;gap:16px}
.ex{background:#060c1a;border:1px solid #0c1a2c;font-size:11px;color:#4a6880}
.label{font-size:9px;color:#4a6880;font-family:'IBM Plex Mono',monospace;margin-top:6px}
.inner{background:#091424;font-size:11px;color:#a8c4de}
</style></head><body>
<div>
  <div class="ex" style="padding:4px 8px">4px · 8px</div>
  <div class="label">badge padding</div>
</div>
<div>
  <div class="ex" style="padding:8px 12px">8px · 12px</div>
  <div class="label">compact button</div>
</div>
<div>
  <div class="ex" style="padding:10px 16px">10px · 16px</div>
  <div class="label">default button / input</div>
</div>
<div>
  <div class="ex" style="padding:16px">
    <div class="inner" style="padding:16px">Inner content area</div>
  </div>
  <div class="label">16px card padding</div>
</div>
<div>
  <div class="ex" style="padding:24px">
    <div class="inner" style="padding:24px">Section content</div>
  </div>
  <div class="label">24px section padding</div>
</div>
<div>
  <div style="display:flex;flex-direction:column;gap:8px">
    <div class="ex" style="padding:10px 14px">Row item 1</div>
    <div class="ex" style="padding:10px 14px">Row item 2</div>
    <div class="ex" style="padding:10px 14px">Row item 3</div>
  </div>
  <div class="label">8px row gap</div>
</div>
</body></html>
