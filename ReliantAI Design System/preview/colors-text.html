<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020510;font-family:'IBM Plex Sans',sans-serif;padding:20px}
.row{display:flex;gap:8px;margin-bottom:12px;align-items:center;padding:10px 14px;border:1px solid #0c1a2c;background:#060c1a}
.sample{flex:1}
.meta{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#4a6880;text-align:right;white-space:nowrap}
</style></head><body>
<div class="row">
  <div class="sample" style="font-size:18px;font-weight:600;color:#ffffff">Text Bright — Headings &amp; Critical Values</div>
  <div class="meta">--re-text-bright · #ffffff</div>
</div>
<div class="row">
  <div class="sample" style="font-size:14px;color:#a8c4de">Text — Primary body copy, descriptions, table cells</div>
  <div class="meta">--re-text · #a8c4de</div>
</div>
<div class="row">
  <div class="sample" style="font-size:13px;color:#4a6880">Text Dim — Labels, secondary info, inactive nav</div>
  <div class="meta">--re-text-dim · #4a6880</div>
</div>
<div class="row">
  <div class="sample" style="font-size:12px;color:#1e3348">Text Muted — Placeholders, disabled states</div>
  <div class="meta">--re-text-muted · #1e3348</div>
</div>
</body></html>
