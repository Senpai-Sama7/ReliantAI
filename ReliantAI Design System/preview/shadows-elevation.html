<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020510;font-family:'IBM Plex Sans',sans-serif;padding:20px;display:flex;gap:12px;flex-wrap:wrap;align-items:flex-start}
.card{padding:16px;font-size:12px;color:#a8c4de;line-height:1.5;min-width:140px}
.label{font-size:9px;color:#4a6880;font-family:'IBM Plex Mono',monospace;margin-top:8px}
</style></head><body>
<div>
  <div class="card" style="background:#060c1a;border:1px solid #0c1a2c">
    Surface<br><span style="color:#4a6880">--re-surface</span>
  </div>
  <div class="label">L1 · base panel</div>
</div>
<div>
  <div class="card" style="background:#091424;border:1px solid #152637">
    Surface Hi<br><span style="color:#4a6880">--re-surface-hi</span>
  </div>
  <div class="label">L2 · hover / modal</div>
</div>
<div>
  <div class="card" style="background:#0d1e35;border:1px solid #152637">
    Surface Pop<br><span style="color:#4a6880">--re-surface-pop</span>
  </div>
  <div class="label">L3 · tooltip / dropdown</div>
</div>
<div style="margin-left:8px;border-left:1px solid #0c1a2c;padding-left:16px;font-size:11px;color:#4a6880;line-height:2;align-self:center">
  <div style="color:#a8c4de;margin-bottom:4px">Elevation system</div>
  <div>No box-shadows.</div>
  <div>Depth = background step.</div>
  <div>1px border only.</div>
  <div>No outer glow on cards.</div>
  <div style="color:#00e5ff;font-size:10px;font-family:'IBM Plex Mono',monospace;margin-top:6px">box-shadow: none</div>
</div>
</body></html>
