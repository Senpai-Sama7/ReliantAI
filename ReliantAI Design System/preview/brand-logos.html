<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020510;font-family:'IBM Plex Sans',sans-serif;padding:24px;display:flex;flex-direction:column;gap:24px}
.logo-row{display:flex;gap:32px;align-items:center;flex-wrap:wrap}
.mark-label{font-size:9px;color:#4a6880;font-family:'IBM Plex Mono',monospace;margin-top:8px}
</style></head><body>

<!-- Full wordmark -->
<div>
  <div style="display:flex;align-items:center;gap:12px">
    <!-- R mark -->
    <svg width="24" height="32" viewBox="0 0 24 32" fill="none">
      <rect x="2" y="2" width="3" height="28" fill="#00e5ff"/>
      <rect x="2" y="2" width="14" height="3" fill="#00e5ff"/>
      <rect x="2" y="14" width="12" height="3" fill="#00e5ff"/>
      <rect x="13" y="2" width="3" height="15" fill="#00e5ff"/>
      <polygon points="14,17 17,17 24,30 20,30" fill="#00e5ff"/>
    </svg>
    <div>
      <div style="font-family:'IBM Plex Sans',sans-serif;font-size:20px;font-weight:700;color:#ffffff;letter-spacing:-0.01em;line-height:1">ReliantAI</div>
      <div style="font-size:10px;color:#4a6880;letter-spacing:0.08em;text-transform:uppercase;margin-top:2px">Digital Operations Suite</div>
    </div>
  </div>
  <div class="mark-label" style="margin-top:10px">Primary lockup · dark background</div>
</div>

<!-- Tagline -->
<div style="border-top:1px solid #0c1a2c;padding-top:20px">
  <div style="font-family:'Fraunces',serif;font-size:28px;font-weight:600;color:#ffffff;line-height:1.1;margin-bottom:6px">Leads contacted in seconds.<br>Not hours.</div>
  <div style="font-size:12px;color:#4a6880;font-family:'IBM Plex Mono',monospace">7× more likely to qualify · HBR Research</div>
</div>

<!-- Service palette -->
<div style="border-top:1px solid #0c1a2c;padding-top:16px;display:flex;gap:16px;flex-wrap:wrap">
  <div style="font-size:13px;font-weight:600;color:#00d4aa">ClearDesk</div>
  <div style="font-size:13px;font-weight:600;color:#ffc400">Money</div>
  <div style="font-size:13px;font-weight:600;color:#7c5cfc">APEX</div>
  <div style="font-size:13px;font-weight:600;color:#00e5ff">B-A-P</div>
  <div style="font-size:13px;font-weight:600;color:#00ff7a">Integration</div>
</div>

</body></html>
