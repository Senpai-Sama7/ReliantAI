<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020510;font-family:'IBM Plex Sans',sans-serif;padding:20px;display:flex;gap:8px;flex-wrap:wrap}
.swatch{min-width:100px;flex:1}
.block{height:56px;margin-bottom:8px;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;color:#020510}
.token{font-family:'IBM Plex Mono',monospace;font-size:9px;color:#4a6880;display:block;margin-bottom:2px}
.hex{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;display:block;margin-bottom:2px}
.use{font-size:10px;color:#4a6880}
</style></head><body>
<div class="swatch">
  <div class="block" style="background:#00e5ff">00e5ff</div>
  <span class="token">--re-cyan</span>
  <span class="hex" style="color:#00e5ff">#00e5ff</span>
  <span class="use">CTA · Active · B-A-P</span>
</div>
<div class="swatch">
  <div class="block" style="background:#00ff7a">00ff7a</div>
  <span class="token">--re-green</span>
  <span class="hex" style="color:#00ff7a">#00ff7a</span>
  <span class="use">Success · Integration</span>
</div>
<div class="swatch">
  <div class="block" style="background:#ffc400">ffc400</div>
  <span class="token">--re-gold</span>
  <span class="hex" style="color:#ffc400">#ffc400</span>
  <span class="use">Money · Revenue</span>
</div>
<div class="swatch">
  <div class="block" style="background:#ff3b5c">ff3b5c</div>
  <span class="token">--re-red</span>
  <span class="hex" style="color:#ff3b5c">#ff3b5c</span>
  <span class="use">Critical · LIFE_SAFETY</span>
</div>
<div class="swatch">
  <div class="block" style="background:#7c5cfc">7c5cfc</div>
  <span class="token">--re-purple</span>
  <span class="hex" style="color:#7c5cfc">#7c5cfc</span>
  <span class="use">APEX · AI/ML</span>
</div>
<div class="swatch">
  <div class="block" style="background:#00d4aa">00d4aa</div>
  <span class="token">--re-teal</span>
  <span class="hex" style="color:#00d4aa">#00d4aa</span>
  <span class="use">ClearDesk · Docs</span>
</div>
</body></html>
