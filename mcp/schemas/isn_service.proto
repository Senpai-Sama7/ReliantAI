syntax = "proto3";

import "common.proto"; // Import common types

package reliantai.services.isn;

// Service for querying and managing the Intelligent Storage (ISN) knowledge graph.
service ISNService {
  // Retrieves entities from ISN based on a query.
  rpc SearchEntities(SearchEntitiesRequest) returns (SearchEntitiesResponse);

  // Retrieves specific nodes by their names.
  rpc GetNodesByName(GetNodesByNameRequest) returns (GetNodesByNameResponse);

  // Adds new entities to the knowledge graph.
  rpc CreateEntities(CreateEntitiesRequest) returns (CreateEntitiesResponse);

  // Creates relations between existing entities.
  rpc CreateRelations(CreateRelationsRequest) returns (CreateRelationsResponse);

  // Adds observations to existing entities.
  rpc AddObservations(AddObservationsRequest) returns (common.OperationResponse);

  // Deletes entities and their associated relations.
  rpc DeleteEntities(DeleteEntitiesRequest) returns (common.OperationResponse);

  // Deletes specific observations from entities.
  rpc DeleteObservations(DeleteObservationsRequest) returns (common.OperationResponse);

  // Deletes relations between entities.
  rpc DeleteRelations(DeleteRelationsRequest) returns (common.OperationResponse);
}

// --- Request and Response Messages ---

message SearchEntitiesRequest {
  string query = 1; // The search query.
  // Add pagination, filtering options as needed later.
}

message SearchEntitiesResponse {
  repeated EntityWithDetails entities = 1;
}

message EntityWithDetails {
  string name = 1;
  string entity_type = 2;
  repeated string observations = 3;
  // Potentially add graph relationship details here.
}

message GetNodesByNameRequest {
  repeated string names = 1; // Entity names to retrieve.
}

message GetNodesByNameResponse {
  repeated EntityWithDetails entities = 1;
}

