name: Client Credential Pipeline Validation

on:
  push:
    branches: [main, master, develop]
    paths:
      - "ops/client-integration/**"
      - ".github/workflows/validate-credentials.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "ops/client-integration/**"
      - ".github/workflows/validate-credentials.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: ops/client-integration

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime Environment
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ops/client-integration/package-lock.json

      - name: Install System Dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit Tests
        run: npm test

  live-credential-audit:
    runs-on: ubuntu-latest
    # Only runs when secrets are present (manual dispatch or protected envs).
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime Environment
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ops/client-integration/package-lock.json

      - name: Install System Dependencies
        run: npm ci

      - name: Execute Token Integrity Audit Script
        run: npm run validate
        env:
          HUBSPOT_APP_ACCESS_TOKEN: ${{ secrets.HUBSPOT_APP_ACCESS_TOKEN }}
          SCHEDULING_API_KEY: ${{ secrets.SCHEDULING_API_KEY }}
          NOTIFICATION_ROUTING_WEBHOOK: ${{ secrets.NOTIFICATION_ROUTING_WEBHOOK }}
          # Keep CI dry-run for Slack unless explicitly overridden in repo vars
          VALIDATE_SLACK_DRY_RUN: ${{ vars.VALIDATE_SLACK_DRY_RUN || 'true' }}

      - name: Pipeline Failure Alert Dispatch
        if: failure()
        run: |
          echo "CRITICAL: Token validation routine rejected one or more endpoints."
