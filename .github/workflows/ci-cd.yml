name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Job 1: Code Quality Checks
  code-quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort bandit safety mypy yamllint pytest
    
    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Check formatting with black
      run: black --check .
    
    - name: Check imports with isort
      run: isort --check-only .
    
    - name: Security check with bandit
      run: bandit -r . -f json -o bandit-report.json
      # Blocking: fail on severity MEDIUM or higher
    
    - name: Check dependencies with safety
      run: safety check --full-report
      # Blocking: fail on any known vulnerability

    - name: Type checking with mypy
      run: |
        mypy scripts/setup_wizard.py --ignore-missing-imports || true
      continue-on-error: true
      # Note: This is non-blocking while codebase type hints are incomplete

    - name: Validate YAML files
      run: |
        yamllint -d relaxed docker-compose*.yml || true
        yamllint -d relaxed .github/workflows/*.yml
      continue-on-error: true

    - name: Run tests
      run: |
        pytest tests/ -v --tb=short || true

  # Job 2: Secrets Detection
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Run gitleaks
      uses: zricethezav/gitleaks-action@v2
      with:
        config-path: .gitleaks.toml
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Run TruffleHog
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: main
        head: HEAD
        extra_args: --debug --only-verified

  # Job 3: Unit Tests
  unit-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-asyncio pytest-cov psycopg2-binary
        pip install -r Money/requirements.txt || true
        pip install -r ComplianceOne/requirements.txt || true
        pip install -r FinOps360/requirements.txt || true
        pip install -r orchestrator/requirements.txt || true
    
    - name: Run unit tests
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test
        TESTING: true
      run: |
        pytest tests/ -v --cov=. --cov-report=xml --cov-report=html || true
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        fail_ci_if_error: false

  # Job 4: Integration Tests
  integration-tests:
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests, secrets-scan]
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker
      uses: docker/setup-buildx-action@v3
    
    - name: Build and start services
      run: |
        cp .env.example .env || true
        docker compose -f docker-compose.yml -f docker-compose.test.yml up -d --build
        sleep 90
    
    - name: Run health checks
      run: |
        chmod +x scripts/health_check.py
        python scripts/health_check.py -v || true
    
    - name: Run integration tests
      run: |
        chmod +x scripts/verify_integration.py
        python scripts/verify_integration.py || true
    
    - name: Cleanup
      if: always()
      run: docker compose down -v

  # Job 5: Security Scan
  security-scan:
    runs-on: ubuntu-latest
    needs: [secrets-scan]
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner (FS)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        ignore-unfixed: true
        format: 'sarif'
        output: 'trivy-fs-results.sarif'
        severity: 'CRITICAL,HIGH'
    
    - name: Run Trivy vulnerability scanner (Images)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'image'
        image-ref: 'reliantai-money:latest'
        format: 'sarif'
        output: 'trivy-image-results.sarif'
        severity: 'CRITICAL,HIGH'
    
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-fs-results.sarif'
    
    - name: Run OWASP ZAP Baseline Scan
      uses: zaproxy/action-baseline@v0.12.0
      with:
        target: 'http://localhost:8000'
        rules_file_name: '.zap/rules.tsv'
        cmd_options: '-a'
      continue-on-error: true

  # Job 6: Build and Push Docker Images
  build-and-push:
    runs-on: ubuntu-latest
    needs: [integration-tests, security-scan]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    
    strategy:
      fail-fast: false
      matrix:
        service:
          - money
          - complianceone
          - finops360
          - orchestrator
          - integration
          - actuator
          - bap
          - apex-agents
          - apex-ui
          - apex-mcp
          - acropolis
          - citadel-ultimate-a-plus
          - citadel
          - cleardesk
          - gen-h
          - documancer
          - backupiq
          - cyberarchitect
          - sovieren-ai
          - regenesis
          - ops-intelligence-backend
          - ops-intelligence-frontend
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./${{ matrix.service }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Job 7: Generate Client SDKs
  generate-sdks:
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker
      uses: docker/setup-buildx-action@v3

    - name: Start core services for spec extraction
      run: |
        cp .env.example .env || true
        docker compose up -d money complianceone finops360 orchestrator integration
        sleep 60

    - name: Generate SDKs
      run: |
        chmod +x scripts/generate-sdks.sh
        ./scripts/generate-sdks.sh ./sdks

    - name: Upload SDK artifacts
      uses: actions/upload-artifact@v4
      with:
        name: reliantai-sdks
        path: ./sdks/*.tar.gz
        retention-days: 30

    - name: Cleanup
      if: always()
      run: docker compose down -v

  # Job 8: Deploy to Staging
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: staging
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to staging
      run: |
        echo "Deploying to staging environment..."
        # Add your staging deployment commands here
        # Example: SSH to server and pull new images
        # ssh user@staging-server "cd /app && docker compose pull && docker compose up -d"

  # Job 9: Production Deployment (manual trigger)
  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
    environment: production
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to production
      run: |
        echo "Deploying to production environment..."
        # Add your production deployment commands here
        # Example: SSH to server and pull new images
        # ssh user@production-server "cd /app && docker compose pull && docker compose up -d"
    
    - name: Run post-deployment health checks
      run: |
        sleep 30
        curl -f http://your-production-domain/health || exit 1
