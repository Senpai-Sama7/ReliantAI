version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: reliantai-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-reliantai}
    ports:
    - 5432:5432
    volumes:
    - postgres_data:/var/lib/postgresql/data
    - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
    - reliantai-network
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${POSTGRES_USER:-postgres}
      interval: 5s
      timeout: 5s
      retries: 5
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
  money:
    build:
      context: ./Money
      dockerfile: Dockerfile
    container_name: reliantai-money
    ports:
    - 8000:8000
    environment:
    - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/money
    - DISPATCH_API_KEY=${DISPATCH_API_KEY:?DISPATCH_API_KEY must be set}
    - GEMINI_API_KEY=${GEMINI_API_KEY:?GEMINI_API_KEY must be set}
    - TWILIO_SID=${TWILIO_SID:?TWILIO_SID must be set}
    - TWILIO_TOKEN=${TWILIO_TOKEN:?TWILIO_TOKEN must be set}
    - ENV=production
    - CORS_ORIGINS=${CORS_ORIGINS:?CORS_ORIGINS must be set}
    - LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-placeholder}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
    - reliantai-network
    volumes:
    - ./shared:/shared:ro
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8000/health
      interval: 30s
      timeout: 10s
      retries: 3
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
  complianceone:
    build:
      context: ./ComplianceOne
      dockerfile: Dockerfile
    container_name: reliantai-complianceone
    ports:
    - 8001:8001
    environment:
    - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/complianceone
    - COMPLIANCEONE_API_KEY=${COMPLIANCEONE_API_KEY:?COMPLIANCEONE_API_KEY must be set}
    - CORS_ORIGINS=${CORS_ORIGINS:?CORS_ORIGINS must be set}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
    - reliantai-network
    volumes:
    - ./shared:/shared:ro
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8001/health
      interval: 30s
      timeout: 10s
      retries: 3
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
  finops360:
    build:
      context: ./FinOps360
      dockerfile: Dockerfile
    container_name: reliantai-finops360
    ports:
    - 8002:8002
    environment:
    - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/finops360
    - FINOPS360_API_KEY=${FINOPS360_API_KEY:?FINOPS360_API_KEY must be set}
    - CORS_ORIGINS=${CORS_ORIGINS:?CORS_ORIGINS must be set}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
    - reliantai-network
    volumes:
    - ./shared:/shared:ro
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8002/health
      interval: 30s
      timeout: 10s
      retries: 3
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
  integration:
    build:
      context: .
      dockerfile: integration/Dockerfile
    container_name: reliantai-integration
    ports:
    - 8080:8080
    environment:
    - REDIS_URL=${REDIS_URL}
    - EVENT_BUS_API_KEY=${EVENT_BUS_API_KEY:?EVENT_BUS_API_KEY must be set}
    - CORS_ORIGINS=${CORS_ORIGINS:?CORS_ORIGINS must be set}
    depends_on:
      redis:
        condition: service_healthy
    networks:
    - reliantai-network
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8080/health
      interval: 30s
      timeout: 10s
      retries: 3
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
  redis:
    image: redis:7-alpine
    container_name: reliantai-redis
    command:
    - sh
    - -c
    - if [ -z "$REDIS_PASSWORD" ]; then redis-server --appendonly yes; else redis-server
      --appendonly yes --requirepass "$REDIS_PASSWORD"; fi
    ports:
    - ${REDIS_PORT:-6380}:6379
    volumes:
    - redis_data:/data
    networks:
    - reliantai-network
    healthcheck:
      test:
      - CMD-SHELL
      - if [ -z "$REDIS_PASSWORD" ]; then redis-cli ping | grep PONG; else redis-cli
        -a "$REDIS_PASSWORD" ping | grep PONG; fi
      interval: 5s
      timeout: 3s
      retries: 5
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
  event-bus:
    build:
      context: .
      dockerfile: integration/event-bus/Dockerfile
    container_name: reliantai-event-bus
    ports:
    - 8081:8081
    environment:
    - REDIS_URL=${REDIS_URL}
    - REDIS_HOST=redis
    - EVENT_BUS_API_KEY=${EVENT_BUS_API_KEY:?EVENT_BUS_API_KEY must be set}
    depends_on:
      redis:
        condition: service_healthy
    networks:
    - reliantai-network
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8081/health
      interval: 30s
      timeout: 10s
      retries: 3
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: reliantai-orchestrator
    ports:
    - 9000:9000
    environment:
    - REDIS_URL=${REDIS_URL}
    - ORCHESTRATOR_API_KEY=${ORCHESTRATOR_API_KEY:?ORCHESTRATOR_API_KEY must be set}
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
    - reliantai-network
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:9000/health
      interval: 30s
      timeout: 10s
      retries: 3
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
  nginx:
    image: nginx:1.25-alpine
    container_name: reliantai-nginx
    entrypoint: ["/bin/sh", "-c", "exec nginx -g 'daemon off;'"]
    ports:
    - ${NGINX_PORT:-8880}:80
    volumes:
    - ./dashboard:/usr/share/nginx/dashboard:ro
    - ./console:/usr/share/nginx/console:ro
    - ./reliant-os/frontend/dist:/usr/share/nginx/os:ro
    - ./nginx/integrated.conf:/etc/nginx/conf.d/default.conf:ro
    - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
    - reliantai-network
    depends_on:
      money:
        condition: service_started
      complianceone:
        condition: service_started
      finops360:
        condition: service_started
      growthengine:
        condition: service_started
      reliant-os-backend:
        condition: service_started
      integration:
        condition: service_started
      event-bus:
        condition: service_started
      mcp-bridge:
        condition: service_started
      health-aggregator:
        condition: service_started
      orchestrator:
        condition: service_started
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost/health
      interval: 30s
      timeout: 10s
      retries: 3
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
  actuator:
    build:
      context: ./actuator
      dockerfile: Dockerfile
    container_name: reliantai-actuator
    environment:
    - REDIS_URL=${REDIS_URL}
    - COMPOSE_FILE=docker-compose.yml
    - COMPOSE_PROJECT=reliantai
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock:ro
    - .:/workspace:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
    - reliantai-network
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8005/health
      interval: 30s
      timeout: 10s
      retries: 3
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
  vault:
    image: vault:1.13
    container_name: reliantai-vault
    ports:
    - 8200:8200
    environment:
    - VAULT_DEV_ROOT_TOKEN_ID=${VAULT_DEV_ROOT_TOKEN_ID:-dev-root-token}
    - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
    volumes:
    - vault_data:/vault/file
    networks:
    - reliantai-network
    cap_add:
    - IPC_LOCK
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8200/v1/sys/health
      interval: 10s
      timeout: 5s
      retries: 5
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
  growthengine:
    build:
      context: ./GrowthEngine
      dockerfile: Dockerfile
    container_name: reliantai-growthengine
    ports:
    - 8003:8003
    environment:
    - API_KEY=${API_KEY:?API_KEY must be set}
    - GOOGLE_PLACES_API_KEY=${GOOGLE_PLACES_API_KEY:-}
    - MONEY_SERVICE_URL=http://money:8000
    - DISPATCH_API_KEY=${DISPATCH_API_KEY:?DISPATCH_API_KEY must be set}
    networks:
    - reliantai-network
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8003/health
      interval: 30s
      timeout: 10s
      retries: 3
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
  reliant-os-backend:
    build:
      context: ./reliant-os/backend
      dockerfile: Dockerfile
    container_name: reliantai-os-backend
    ports:
    - 8004:8004
    environment:
    - ENV=production
    - SECURE_DATA_PATH=/app/data
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock:ro
    - .:/workspace:ro
    networks:
    - reliantai-network
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8004/health
      interval: 30s
      timeout: 10s
      retries: 3
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
  reliant-os-frontend:
    build:
      context: ./reliant-os/frontend
      dockerfile: Dockerfile
    container_name: reliantai-os-frontend
    ports:
    - 8085:80
    depends_on:
      reliant-os-backend:
        condition: service_started
    networks:
    - reliantai-network
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost/health
      interval: 30s
      timeout: 10s
      retries: 3
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
  mcp-bridge:
    build:
      context: ./integration/mcp-bridge
      dockerfile: Dockerfile
    container_name: reliantai-mcp-bridge
    ports:
    - 8083:8083
    environment:
    - REDIS_URL=${REDIS_URL}
    - MCP_API_KEY=${MCP_API_KEY:-mcp-dev-key}
    - API_KEY=${API_KEY}
    - DISPATCH_API_KEY=${DISPATCH_API_KEY}
    - COMPLIANCEONE_API_KEY=${COMPLIANCEONE_API_KEY}
    - FINOPS360_API_KEY=${FINOPS360_API_KEY}
    - ORCHESTRATOR_API_KEY=${ORCHESTRATOR_API_KEY}
    - EVENT_BUS_API_KEY=${EVENT_BUS_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
      money:
        condition: service_started
      growthengine:
        condition: service_started
      complianceone:
        condition: service_started
      finops360:
        condition: service_started
      orchestrator:
        condition: service_started
    networks:
    - reliantai-network
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8083/health
      interval: 30s
      timeout: 10s
      retries: 3
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
  health-aggregator:
    build:
      context: ./integration/health-aggregator
      dockerfile: Dockerfile
    container_name: reliantai-health-aggregator
    ports:
    - 8086:8086
    environment:
    - REDIS_URL=${REDIS_URL}
    - ORCHESTRATOR_URL=http://orchestrator:9000
    - MCP_BRIDGE_URL=http://mcp-bridge:8083
    depends_on:
      redis:
        condition: service_healthy
      money:
        condition: service_started
      complianceone:
        condition: service_started
      finops360:
        condition: service_started
      orchestrator:
        condition: service_started
    networks:
    - reliantai-network
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8086/health
      interval: 30s
      timeout: 10s
      retries: 3
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  sovereign-ai:
    build:
      context: ./sovereign_ai
      dockerfile: Dockerfile
    container_name: reliantai-sovereign-ai
    ports:
    - 8106:8106
    environment:
    - PORT=8106
    - HOST=0.0.0.0
    - NODE_ENV=production
    networks:
    - reliantai-network
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8106/health
      interval: 30s
      timeout: 10s
      retries: 3
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

volumes:
  postgres_data: null
  redis_data: null
  vault_data: null
  reliant_os_data: null
networks:
  reliantai-network:
    driver: bridge
