server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ── Docker container logs (structured JSON + plain) ────────────────────────
  - job_name: containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: containerlogs
          __path__: /var/lib/docker/containers/*/*log
    pipeline_stages:
      # Docker JSON log format: {"log":"...","stream":"...","time":"..."}
      - json:
          expressions:
            output: log
            stream: stream
            attrs:
      - json:
          expressions:
            tag:
          source: attrs
      - regex:
          expression: (?P<container_name>(?:[^|])*[^|]).*(?P<container_id>(?:[^|])*[^|])
          source: tag
      - timestamp:
          format: RFC3339Nano
          source: time
      - labels:
          stream:
          container_name:
          container_id:
      - output:
          source: output

      # Attempt to parse structured JSON log lines emitted by ReliantAI services
      - match:
          selector: '{job="containerlogs"}'
          stages:
            - json:
                expressions:
                  event: event
                  level: level
                  service: service
                  correlation_id: correlation_id
                  timestamp: timestamp
            - labels:
                event:
                level:
                service:
            - timestamp:
                format: RFC3339
                source: timestamp

  # ── System logs ────────────────────────────────────────────────────────────
  - job_name: syslog
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          __path__: /var/log/syslog
    pipeline_stages:
      - regex:
          expression: '(?P<timestamp>\w+ \d+ \d+:\d+:\d+) (?P<host>\S+) (?P<service>\S+): (?P<message>.*)'
      - labels:
          service:
      - timestamp:
          format: "Jan 02 15:04:05"
          source: timestamp
      - output:
          source: message

  # ── Nginx access logs ──────────────────────────────────────────────────────
  - job_name: nginx-access
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          __path__: /var/log/nginx/access.log
    pipeline_stages:
      - regex:
          expression: '^(?P<remote_addr>\S+) - (?P<remote_user>\S+) \[(?P<time_local>[^\]]+)\] "(?P<request>[^"]+)" (?P<status>\d+) (?P<body_bytes_sent>\d+) "(?P<http_referer>[^"]+)" "(?P<http_user_agent>[^"]+)"'
      - labels:
          status:
          remote_addr:
      - timestamp:
          format: "02/Jan/2006:15:04:05 -0700"
          source: time_local
      - output:
          source: request

  # ── Nginx error logs ───────────────────────────────────────────────────────
  - job_name: nginx-error
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx-error
          __path__: /var/log/nginx/error.log
    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\d{4}/\d{2}/\d{2} \d{2}:\d{2}:\d{2}) \[(?P<level>\w+)\].*'
      - labels:
          level:
      - timestamp:
          format: "2006/01/02 15:04:05"
          source: timestamp
      - output:
          source: message

  # ── ReliantAI service logs (direct file ingestion for non-Docker) ─────────
  - job_name: reliantai-services
    static_configs:
      - targets:
          - localhost
        labels:
          job: reliantai
          __path__: /var/log/reliantai/*.log
    pipeline_stages:
      - json:
          expressions:
            event: event
            level: level
            service: service
            message: message
            correlation_id: correlation_id
      - labels:
          event:
          level:
          service:
      - output:
          source: message
