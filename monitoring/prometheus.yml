global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: reliantai
    replica: '{{.ExternalURL}}'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Money Service
  - job_name: 'money'
    static_configs:
      - targets: ['money:8000']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # ComplianceOne Service
  - job_name: 'complianceone'
    static_configs:
      - targets: ['complianceone:8001']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # FinOps360 Service
  - job_name: 'finops360'
    static_configs:
      - targets: ['finops360:8002']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Orchestrator Service
  - job_name: 'orchestrator'
    static_configs:
      - targets: ['orchestrator:9000']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Integration Service
  - job_name: 'integration'
    static_configs:
      - targets: ['integration:8080']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # PostgreSQL
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 30s

  # Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 30s

  # Nginx
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']
    scrape_interval: 30s

  # Node Exporter (for system metrics)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 30s

  # cAdvisor (for Docker container metrics)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 30s
