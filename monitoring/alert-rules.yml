groups:
  - name: reliantai-critical-services
    rules:
      # ── Core Service Health ──────────────────────────────────────────────
      - alert: ServiceDown
        expr: up{job=~"money|complianceone|finops360|orchestrator|integration|actuator"} == 0
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Core service {{ $labels.job }} is down"
          description: "Service {{ $labels.job }} has been down for more than 1 minute."

      - alert: SupportingServiceDown
        expr: up{job=~"bap|apex-agents|apex-ui|apex-mcp|ops-intelligence-backend|ops-intelligence-frontend|citadel|citadel-ultimate-a-plus|documancer|backupiq|cyberarchitect|sovereign-ai|regenesis|acropolis|cleardesk|gen-h"} == 0
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "Service {{ $labels.job }} has been down for more than 5 minutes."

      # ── Response Time ────────────────────────────────────────────────────
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High response time on {{ $labels.job }}"
          description: "95th percentile response time is {{ $value }}s on {{ $labels.job }}"

      - alert: CriticalResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 5
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "CRITICAL response time on {{ $labels.job }}"
          description: "95th percentile response time is {{ $value }}s on {{ $labels.job }} — immediate attention required"

      # ── Error Rate ───────────────────────────────────────────────────────
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "High error rate on {{ $labels.job }}"
          description: "Error rate is {{ $value | humanizePercentage }} on {{ $labels.job }}"

      - alert: ElevatedErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.01
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Elevated error rate on {{ $labels.job }}"
          description: "Error rate is {{ $value | humanizePercentage }} on {{ $labels.job }}"

      # ── Database ─────────────────────────────────────────────────────────
      - alert: DatabaseConnectionsHigh
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High database connection count"
          description: "PostgreSQL has {{ $value }} active connections"

      - alert: DatabaseConnectionsCritical
        expr: pg_stat_activity_count > 150
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "CRITICAL database connection count"
          description: "PostgreSQL has {{ $value }} active connections — approaching max_connections"

      # ── Infrastructure ───────────────────────────────────────────────────
      - alert: DiskSpaceLow
        expr: node_filesystem_avail_bytes / node_filesystem_size_bytes < 0.1
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Disk space is below 10% on {{ $labels.instance }}"

      - alert: DiskSpaceCritical
        expr: node_filesystem_avail_bytes / node_filesystem_size_bytes < 0.05
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "CRITICAL disk space on {{ $labels.instance }}"
          description: "Disk space is below 5% on {{ $labels.instance }}"

      - alert: HighMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes > 0.85
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is above 85% on {{ $labels.instance }}"

      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is above 80% on {{ $labels.instance }}"

      # ── Redis ────────────────────────────────────────────────────────────
      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Redis is down"
          description: "Redis instance {{ $labels.instance }} is unreachable"

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High Redis memory usage"
          description: "Redis memory usage is {{ $value | humanizePercentage }}"

      # ── Nginx / Gateway ──────────────────────────────────────────────────
      - alert: NginxHighRequestRate
        expr: rate(nginx_http_requests_total[5m]) > 10000
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High nginx request rate"
          description: "Nginx is handling {{ $value }} requests/sec"

      - alert: Nginx502RateHigh
        expr: rate(nginx_http_requests_total{status="502"}[5m]) > 0.1
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "High 502 rate from nginx"
          description: "Nginx is returning 502 at {{ $value }}/sec — upstream may be down"

      # ── Vault ────────────────────────────────────────────────────────────
      - alert: VaultDown
        expr: up{job="vault"} == 0
        for: 2m
        labels:
          severity: warning
          team: security
        annotations:
          summary: "HashiCorp Vault is down"
          description: "Vault is unreachable — secret injection may fail"

      # ── Loki / Logging ───────────────────────────────────────────────────
      - alert: LokiIngestionRateHigh
        expr: rate(loki_request_duration_seconds_count[5m]) > 5000
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High Loki ingestion rate"
          description: "Loki is ingesting {{ $value }} log lines/sec"

      # ── Container Health (cAdvisor) ──────────────────────────────────────
      - alert: ContainerRestartLoop
        expr: rate(container_start_time_seconds[10m]) > 0
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Container {{ $labels.name }} is restarting"
          description: "Container {{ $labels.name }} has restarted in the last 10 minutes"

      - alert: ContainerOOMKilled
        expr: container_memory_failures_total{failure_type="pgmajfault"} > 0
        for: 0m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Container {{ $labels.name }} OOM risk"
          description: "Container {{ $labels.name }} experiencing memory pressure (major page faults)"
